name: Daily Sync — MySQL to Firestore
# NOTE: Runs from your Mac instead (node ~/Desktop/run-sync.js)
# GitHub Actions can't reach the AWS RDS — run sync locally any time you want.

on:
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to sync (YYYY-MM-DD)'
        required: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: cd sync && npm install
      - name: Run sync
        env:
          MYSQL_HOST:     ${{ secrets.MYSQL_HOST }}
          MYSQL_PORT:     3306
          MYSQL_USER:     ${{ secrets.MYSQL_USER }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node sync/sync.js "${{ github.event.inputs.date }}"
