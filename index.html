function badge(status) {
  const map = {
    'delivered':'badge-green','Executed':'badge-green','success':'badge-green','active':'badge-green',
    'pending':'badge-amber','Executing':'badge-amber','executing':'badge-amber',
    'failed':'badge-red','error':'badge-red','inactive':'badge-gray',
    'Calculated':'badge-blue','calculated':'badge-blue','info':'badge-blue',
    'Skipped':'badge-gray','skipped':'badge-gray',
    'warning':'badge-amber',
  };
  const cls = map[status] || 'badge-gray';
  return '<span class="badge ' + cls + '">' + status + '</span>';
}

function openPanel(title, html) {
  document.getElementById('slide-panel-title').textContent = title;
  document.getElementById('slide-panel-body').innerHTML = html;
  document.getElementById('slide-panel').classList.add('open');
  document.getElementById('panel-overlay').style.display = 'block';
}

function closePanel() {
  document.getElementById('slide-panel').classList.remove('open');
  document.getElementById('panel-overlay').style.display = 'none';
}

function openModal(html) {
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-overlay').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
}

document.getElementById('modal-overlay').addEventListener('click', function(e){
  if(e.target===this) closeModal();
});

function pColor(pct) {
  return pct>=70?'':pct>=40?'amber':'red';
}

function addMins(time, mins) {
  const [h,m] = time.split(':').map(Number);
  const t = h*60+m+mins;
  return String(Math.floor(t/60)).padStart(2,'0')+':'+String(t%60).padStart(2,'0');
}

function genStops(r) {
  const cos = ['Check24','Stylight','Westwing','Celonis','Allianz','Siemens','MAN','Telefonica','BMW','Bosch'];
  const sts = ['Landsberger Str.','Nymphenburger Str.','Schleisskstr.','Dachauer Str.','Leopoldstr.','Maximilianstr.'];
  return Array.from({length:r.stops},(_,j)=>({
    company:cos[j%cos.length]+' '+(j+1),
    address:sts[j%sts.length]+' '+(10+j*12),
    eta:addMins(r.start,j*8),
    status:j<r.stops-r.late?'delivered':(j===r.stops-1?'failed':'pending'),
    boxes:Math.max(1,Math.ceil(r.boxes/r.stops)),
  }));
}

function mkRouteCard(r,i) {
  const pct = Math.round((r.stops-r.late)/r.stops*100);
  const stops = genStops(r);

// GEOCODING — real addresses via Nominatim (OpenStreetMap)
// Cached in localStorage to avoid repeated API calls
// ════════════════════════════════════════════════════════════
const _geoCache = (() => {
  try { return JSON.parse(localStorage.getItem('_geocache') || '{}'); } catch(e) { return {}; }
})();

function _saveGeoCache() {
  try { localStorage.setItem('_geocache', JSON.stringify(_geoCache)); } catch(e) {}
}

async function geocodeAddress(address, postCode, city) {
  if (!address) return null;
  const key = (address + postCode + city).replace(/\s+/g,'').toLowerCase();
  if (_geoCache[key]) return _geoCache[key];

  // Try full address first, then just postcode+city
  const queries = [
    encodeURIComponent(address + ', ' + postCode + ' ' + city + ', Germany'),
    encodeURIComponent(postCode + ' ' + city + ', Germany'),
  ];

  for (const q of queries) {
    try {
      const r = await fetch(
        'https://nominatim.openstreetmap.org/search?q='+q+'&format=json&limit=1&countrycodes=de',
        { headers: { 'Accept-Language': 'de', 'User-Agent': 'BellaBona-LMM/1.0' } }
      );
      const data = await r.json();
      if (data && data[0]) {
        const coords = [parseFloat(data[0].lat), parseFloat(data[0].lon)];
        _geoCache[key] = coords;
        _saveGeoCache();
        return coords;
      }
    } catch(e) {}
    await new Promise(res => setTimeout(res, 1100)); // Nominatim rate limit: 1 req/sec
  }
  return null;
}

// Batch geocode an array of stops — returns map of branchId → [lat,lng]
async function geocodeStops(stops) {
  const results = {};
  for (const s of stops) {
    if (!s.address || !s.postCode) continue;
    const coords = await geocodeAddress(s.address, s.postCode, s.city || '');
    if (coords) results[s.branchId] = coords;
  }
  return results;
}

async function planLoadOrders() {
  const btn = (typeof event !== 'undefined' && event?.target?.tagName === 'BUTTON') ? event.target : null;
  if(btn) { btn.disabled=true; btn.textContent='Loading…'; }
  const bodyEl = document.getElementById('plan-body');
  // Cloud mode — load weekly template + match against any injected _planStops
  if (!API_BASE) {
    await loadFromWeeklyTemplate(bodyEl);
    if(btn) { btn.disabled=false; btn.textContent='↻ Reload from OMS'; }
    return;
  }
  if(bodyEl) bodyEl.innerHTML = '<div style="text-align:center;padding:40px;color:#9ca3af">⏳ Fetching live orders from OMS…</div>';
  try {
    const r = await fetch(`${API_BASE}/api/planning/orders?date=${_planDate}&kitchen=${_planKitchen}`);
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Failed');
    _planStops = d.stops || [];
    _planAssign = {};
    _planNotes  = {};

    // Try last-week assignments first (most accurate), fall back to zone auto-assign
    try {
      const lw = await fetch(`${API_BASE}/api/planning/last-week?date=${_planDate}&kitchen=${_planKitchen}`);
      const ld = await lw.json();
      const assignments = ld.assignments || {};
      let matched = 0;
      _planStops.forEach(s => {
        const key = s.company.toLowerCase().trim();
        const shortKey = shortName(s.company).toLowerCase().trim();
        const courier = assignments[key] || assignments[shortKey];
        if (courier) { _planAssign[s.branchId] = courier; matched++; }
      });
      // Any unmatched → zone auto-assign
      if (matched < _planStops.length) await planAutoAssign(true);
      const src = matched > 0 ? `last week (${matched} matched) + zone fallback` : 'zone auto-assign';
      if(bodyEl) bodyEl.innerHTML =
        '<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:8px 14px;font-size:13px;color:#16a34a;margin-bottom:8px">' +
        '✅ <b>'+_planStops.length+' stops · '+d.totalOrders+' orders</b> loaded from OMS for <b>'+_planKitchen+'</b> on <b>'+_planDate+'</b> &nbsp;·&nbsp; Assignments: '+src+'</div>';
    } catch {
      await planAutoAssign(true);
      if(bodyEl) bodyEl.innerHTML =
        '<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:8px 14px;font-size:13px;color:#16a34a;margin-bottom:8px">' +
        '✅ <b>'+_planStops.length+' stops · '+d.totalOrders+' orders</b> loaded from OMS · Assignments by zone</div>';
    }
    _paintPlanGrid();
  } catch(e) {
    if(bodyEl) bodyEl.innerHTML =
      '<div style="background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:14px;color:#dc2626">'+
      '❌ Could not reach the backend: <b>'+e.message+'</b><br><br>'+
      'Make sure the server is running: <code>node server.js</code></div>';
  }
  if(btn) { btn.disabled=false; btn.textContent='↻ Reload from OMS'; }
}

// ──────────────────────────────────────────────────────────────
// WEEKLY TEMPLATE — load from Firestore, match against today's orders
// ──────────────────────────────────────────────────────────────
async function loadFromWeeklyTemplate(bodyEl) {
  const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const dayName = DAY_NAMES[new Date(_planDate + 'T12:00:00').getDay()];

  if(bodyEl) bodyEl.innerHTML = '<div style="text-align:center;padding:40px;color:#9ca3af">⏳ Loading plan for '+_planDate+'…</div>';

  if (!window._fbReady || !window._fbDb) {
    if(bodyEl) bodyEl.innerHTML = '<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:14px;color:#92400e;font-size:13px">⏳ Firebase loading, please try again in a moment.</div>';
    return;
  }

  try {
    // ── Step 1: Check for a saved daily plan for this exact date ──
    const planKey = _planDate + '_' + _planKitchen;
    const savedSnap = await window._fbGetDoc(window._fbDoc(window._fbDb, 'dailyPlans', planKey));
    if (savedSnap.exists()) {
      const saved = savedSnap.data();
      const assignments = saved.assignments || [];
      // Restore stops
      _planStops = assignments.map(a => ({
        branchId:    a.branchId,    company:     a.company,
        address:     a.address,     postCode:    a.postCode,
        city:        a.city||'',    deliveryInfo:a.deliveryInfo||'',
        orderCount:  a.orderCount||1, hasOrder:  a.hasOrder !== false,
        isManual:    a.isManual||false,
        templateName: a.templateName || a.company,
      }));
      // Restore assignments & notes
      _planAssign = {};
      assignments.forEach(a => { _planAssign[a.branchId] = a.courier||'Unassigned'; });
      _planNotes  = saved.notes || {};
      _planDrivers = saved.drivers || [...new Set(assignments.map(a=>a.courier).filter(Boolean))].filter(d=>d!=='Unassigned').sort();
      // Also load weekly template for dispatcher names
      const tmplSnap = await window._fbGetDoc(window._fbDoc(window._fbDb, 'weeklyTemplates', dayName));
      if (tmplSnap.exists()) _weeklyTemplate = tmplSnap.data();
      const savedAt = saved.savedAt ? new Date(saved.savedAt).toLocaleString('de-DE',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
      if(bodyEl) bodyEl.innerHTML =
        '<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:8px 14px;font-size:13px;color:#16a34a;margin-bottom:8px">' +
        '✅ <b>Saved plan restored</b> for '+_planDate+' ('+_planKitchen+') &nbsp;·&nbsp; '+_planStops.length+' stops' +
        (savedAt ? ' &nbsp;·&nbsp; last saved '+savedAt : '') +
        ' &nbsp;·&nbsp; <a href="#" onclick="clearAndReload(event)" style="color:#16a34a;text-decoration:underline">Clear & reload fresh</a></div>';
      _paintPlanGrid();
      return;
    }

    // ── Step 2: No saved plan — fall back to weekly template ──
    const snap = await window._fbGetDoc(window._fbDoc(window._fbDb, 'weeklyTemplates', dayName));
    if (!snap.exists()) {
      if(bodyEl) bodyEl.innerHTML =
        '<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:14px;color:#92400e;font-size:13px">' +
        '📋 No weekly template for <b>'+dayName+'</b> yet. Paste JSON or drag-drop to build one, then click <b>💾 Save as Weekly Template</b>.</div>';
      return;
    }
    _weeklyTemplate = snap.data();

    // _planStops may already be populated (from Paste JSON or manual injection)
    // Build a map: normalised company name → stop data
    const orderMap = {};
    (_planStops||[]).forEach(s => {
      const key = s.company.toLowerCase().replace(/[^a-z0-9]/g,'');
      orderMap[key] = s;
    });

    function findOrder(templateName) {
      const tKey = templateName.toLowerCase().replace(/[^a-z0-9]/g,'');
      // exact
      if (orderMap[tKey]) return orderMap[tKey];
      // partial match
      for (const [k, s] of Object.entries(orderMap)) {
        if (k.includes(tKey.substring(0,6)) || tKey.includes(k.substring(0,6))) return s;
      }
      return null;
    }

    // Rebuild _planStops from template (ordered) + unmatched orders
    const usedBranchIds = new Set();
    const newStops = [];
    _planAssign = {};
    _planNotes  = {};

    for (const [driver, companies] of Object.entries(_weeklyTemplate.routes || {})) {
      for (const tmplName of companies) {
        const ordered = findOrder(tmplName);
        const id = ordered ? ordered.branchId : ('tmpl_' + tmplName.replace(/[^a-zA-Z0-9]/g,'_'));
        if (ordered) usedBranchIds.add(ordered.branchId);
        newStops.push({
          branchId:    id,
          company:     ordered ? ordered.company : tmplName,
          templateName: tmplName,
          address:     ordered ? ordered.address : '',
          postCode:    ordered ? ordered.postCode : '',
          deliveryInfo: ordered ? (ordered.deliveryInfo||'') : '',
          orderCount:  ordered ? (ordered.orderCount||1) : 0,
          hasOrder:    !!ordered,
        });
        _planAssign[id] = driver;
      }
    }

    // Add any orders NOT matched to template → Unassigned
    (_planStops||[]).forEach(s => {
      if (!usedBranchIds.has(s.branchId)) {
        newStops.push({...s, hasOrder:true});
        _planAssign[s.branchId] = 'Unassigned';
      }
    });

    _planStops = newStops;
    _planDrivers = _weeklyTemplate.drivers || [...new Set(Object.values(_planAssign))].filter(d=>d!=='Unassigned').sort();

    const ordered  = newStops.filter(s=>s.hasOrder).length;
    const missing  = newStops.filter(s=>!s.hasOrder).length;
    const unassigned = newStops.filter(s=>_planAssign[s.branchId]==='Unassigned').length;

    if(bodyEl) bodyEl.innerHTML =
      '<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:8px 14px;font-size:13px;color:#16a34a;margin-bottom:8px">' +
      '✅ <b>'+dayName+' template loaded</b> · '+ordered+' ordered · ' +
      '<span style="color:#dc2626;font-weight:700">'+missing+' not ordered today (red)</span>' +
      (unassigned > 0 ? ' · '+unassigned+' new stops (left)' : '') + '</div>';

    _paintPlanGrid();
  } catch(e) {
    if(bodyEl) bodyEl.innerHTML = '<div style="background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:14px;color:#dc2626;font-size:13px">❌ '+e.message+'</div>';
  }
}

async function saveWeeklyTemplate() {
  if (!window._fbReady || !window._fbDb) { alert('Firebase not ready'); return; }
  if (_planStops.length === 0) { alert('Load orders first'); return; }
  const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const dayName = DAY_NAMES[new Date(_planDate + 'T12:00:00').getDay()];
  const btn = event.target; btn.disabled=true; btn.textContent='Saving…';
  try {
    // Build routes from current assignment
    const routes = {};
    _planDrivers.filter(d=>d!=='Unassigned').forEach(d => { routes[d] = []; });
    _planStops.forEach(s => {
      const driver = _planAssign[s.branchId];
      if (driver && driver !== 'Unassigned') {
        routes[driver] = routes[driver] || [];
        routes[driver].push(s.templateName || s.company);
      }
    });
    const tmpl = { drivers: _planDrivers.filter(d=>d!=='Unassigned'), routes,
      dispatchers: (_weeklyTemplate && _weeklyTemplate.dispatchers) || [],
      updatedAt: new Date().toISOString() };
    await window._fbSetDoc(window._fbDoc(window._fbDb,'weeklyTemplates',dayName), tmpl);
    _weeklyTemplate = tmpl;
    alert('✅ '+dayName+' template saved! Every future '+dayName+' will use this route.');
  } catch(e) { alert('Error: '+e.message); }
  btn.disabled=false; btn.textContent='💾 Save as Weekly Template';
}

function _paintPlanGrid() {
  if (_planStops.length === 0) return;

  _planStops.forEach(s => { if (!_planAssign[s.branchId]) _planAssign[s.branchId] = 'Unassigned'; });
  if (_weeklyTemplate && _weeklyTemplate.drivers) {
    _planDrivers = [..._weeklyTemplate.drivers];
    const extras = [...new Set(Object.values(_planAssign))].filter(d => d !== 'Unassigned' && !_planDrivers.includes(d));
    _planDrivers.push(...extras);
  } else {
    _planDrivers = [...new Set(Object.values(_planAssign))].filter(d => d !== 'Unassigned').sort();
  }
  const hasUnassigned = _planStops.some(s => _planAssign[s.branchId] === 'Unassigned');
  const allDrivers = hasUnassigned ? ['Unassigned', ..._planDrivers] : [..._planDrivers];
  const colStops = {};
  allDrivers.forEach(d => { colStops[d] = _planStops.filter(s => _planAssign[s.branchId] === d); });
  const maxRows = Math.max(...allDrivers.map(d => colStops[d].length), 1);
  const dispatchers = (_weeklyTemplate && _weeklyTemplate.dispatchers) ? [..._weeklyTemplate.dispatchers] : [];
  const COL_W = 160;

  const COL_COLORS = {Samir:'#fde68a',Ali1:'#bbf7d0',Ali2:'#bfdbfe',Ali:'#bbf7d0',
    Jozef:'#fecaca',Josef:'#fecaca',Martin:'#ddd6fe',Tasnim:'#fed7aa',
    Packator:'#e5e7eb',Packator1:'#e5e7eb',Packator2:'#d1fae5',
    Piyush:'#fce7f3',Mykhaielo:'#cffafe',Kartik:'#fef3c7',
    Yousef:'#ede9fe',Ali3:'#d1fae5',Unassigned:'#fef9c3'};
  const colColor = d => COL_COLORS[d] || (DRIVER_COLORS&&DRIVER_COLORS[d]) || '#f3f4f6';

  const wrapper = document.createElement('div');
  wrapper.style.cssText = 'overflow-x:auto;padding-bottom:16px;user-select:none';

  const table = document.createElement('table');
  table.id = 'plan-table';
  table.style.cssText = 'border-collapse:collapse;table-layout:fixed';

  // ── HEADER: driver names (click to rename) ──
  const thead = table.createTHead();
  const hRow = thead.insertRow();
  allDrivers.forEach(driver => {
    const th = document.createElement('th');
    th.style.cssText = 'background:'+colColor(driver)+';border:2px solid #111;padding:6px 8px;font-size:13px;font-weight:700;text-align:center;min-width:'+COL_W+'px;width:'+COL_W+'px;cursor:pointer;white-space:nowrap';
    th.dataset.driver = driver;
    const label = driver === 'Unassigned' ? '⚠️ New' : driver;
    th.innerHTML = '<div style="pointer-events:none">'+label+'<br><span style="font-size:10px;font-weight:400;color:#374151">'+colStops[driver].length+' stops</span></div>';
    th.title = 'Click to rename';
    th.addEventListener('click', function() {
      if (driver === 'Unassigned') return;
      const n = prompt('Rename driver:', driver);
      if (!n || !n.trim() || n.trim() === driver) return;
      const name = n.trim();
      _planStops.forEach(s => { if (_planAssign[s.branchId] === driver) _planAssign[s.branchId] = name; });
      const di = _planDrivers.indexOf(driver); if (di >= 0) _planDrivers[di] = name;
      if (_weeklyTemplate) {
        const ti = (_weeklyTemplate.drivers||[]).indexOf(driver); if (ti >= 0) _weeklyTemplate.drivers[ti] = name;
        if (_weeklyTemplate.routes && _weeklyTemplate.routes[driver]) { _weeklyTemplate.routes[name] = _weeklyTemplate.routes[driver]; delete _weeklyTemplate.routes[driver]; }
      }
      _paintPlanGrid();
    });
    hRow.appendChild(th);
  });
  const thAdd = document.createElement('th');
  thAdd.style.cssText = 'background:#f9fafb;border:2px solid #111;width:44px;text-align:center;vertical-align:middle;font-size:11px';
  thAdd.innerHTML = '<button onclick="planAddDriver()" style="background:#1a1a2e;color:#fff;border:none;border-radius:4px;padding:3px 5px;cursor:pointer;font-size:10px">+Driver</button>';
  hRow.appendChild(thAdd);

  // ── BODY: stop cells ──
  const tbody = table.createTBody();
  for (let i = 0; i < maxRows; i++) {
    const row = tbody.insertRow();
    allDrivers.forEach(driver => {
      const s = colStops[driver][i];
      const td = row.insertCell();
      td.style.cssText = 'border:1px solid #d1d5db;padding:5px 7px;font-size:12px;width:'+COL_W+'px;vertical-align:top;transition:border 0.1s';
      td.dataset.driver = driver;
      if (s) {
        const noOrder = s.hasOrder === false;
        const isPickup = (s.templateName||s.company).toLowerCase().startsWith('pickup');
        const note = _planNotes[s.branchId] || '';
        if (noOrder)       { td.style.background='#fee2e2'; td.style.color='#b91c1c'; }
        else if (isPickup) { td.style.background='#f0fdf4'; td.style.color='#166534'; }
        else if (note)     { td.style.background='#faf5ff'; td.style.color='#111'; }
        else               { td.style.background='#fff'; td.style.color='#111'; }
        td.draggable = true;
        td.dataset.id = s.branchId;
        td.title = s.company+'\n'+s.address+', '+s.postCode+(noOrder?'\n❌ No order today':'\n'+s.orderCount+' orders');
        const sn = shortName(s.company);
        const cnt = s.orderCount > 1 ? ' ('+s.orderCount+')' : '';
        const inner = document.createElement('div');
        inner.style.cssText = 'display:flex;justify-content:space-between;align-items:center;gap:2px;pointer-events:none';
        const ns = document.createElement('span');
        ns.style.cssText = 'font-weight:'+(noOrder?'400':'600')+';text-decoration:'+(noOrder?'line-through':'none')+';overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;font-size:11px';
        ns.textContent = (noOrder?'❌ ':'')+sn+cnt;
        inner.appendChild(ns);
        const bw = document.createElement('span');
        bw.style.cssText = 'display:flex;gap:1px;flex-shrink:0;pointer-events:auto';
        const eb = document.createElement('span'); eb.textContent='✎'; eb.title='Note';
        eb.style.cssText='cursor:pointer;color:#9ca3af;font-size:11px;padding:0 2px';
        eb.addEventListener('click',e=>{e.stopPropagation();planEditNote(s.branchId,sn);});
        const db = document.createElement('span'); db.textContent='×'; db.title='Remove';
        db.style.cssText='cursor:pointer;color:#ef4444;font-size:14px;font-weight:700;padding:0 2px;line-height:1';
        db.addEventListener('click',e=>{e.stopPropagation();planDeleteStop(s.branchId,s.company);});
        bw.append(eb,db); inner.appendChild(bw); td.appendChild(inner);
        if (note) { const nd=document.createElement('div'); nd.style.cssText='font-size:10px;color:#7c3aed;margin-top:2px;font-style:italic;pointer-events:none'; nd.textContent=note; td.appendChild(nd); }
        td.addEventListener('dragstart',e=>{
          _planDragId=s.branchId; _planDropTarget=null; _planDropPos='after'; _planDropDriver=null;
          e.dataTransfer.effectAllowed='move';
          setTimeout(()=>{td.style.opacity='0.3';},0);

        td.addEventListener('dragend',()=>{td.style.opacity='';});
      } else {
        td.style.background='#fafafa';
      }
      // Every cell is a drop target
      td.addEventListener('dragover',e=>{
        e.preventDefault(); e.stopPropagation();
        _planDropTarget = s ? s.branchId : null;
        _planDropDriver = driver;
        const rect = td.getBoundingClientRect();
        _planDropPos = (e.clientY < rect.top + rect.height/2) ? 'before' : 'after';
        td.style.borderTop    = _planDropPos==='before' ? '3px solid #e85d04' : '1px solid #d1d5db';
        td.style.borderBottom = _planDropPos==='after'  ? '3px solid #e85d04' : '1px solid #d1d5db';
      });
      td.addEventListener('dragleave',()=>{td.style.borderTop='1px solid #d1d5db';td.style.borderBottom='1px solid #d1d5db';});
      td.addEventListener('drop',e=>{
        e.preventDefault(); e.stopPropagation();
        td.style.borderTop='1px solid #d1d5db'; td.style.borderBottom='1px solid #d1d5db';
        if (!_planDragId) return;
        const tid = _planDropTarget; const tdrv = _planDropDriver||driver; const pos = _planDropPos||'after';
        if (_planDragId===tid){_planDragId=null;return;}
        const dragged = _planStops.find(s2=>s2.branchId===_planDragId);
        if (!dragged){_planDragId=null;return;}
        _planStops = _planStops.filter(s2=>s2.branchId!==_planDragId);
        let insertAt;
        if (tid) {
          const ti = _planStops.findIndex(s2=>s2.branchId===tid);
          insertAt = ti<0 ? _planStops.length : (pos==='before'?ti:ti+1);
        } else {
          let last=-1;
          for (let j=_planStops.length-1;j>=0;j--){if(_planAssign[_planStops[j].branchId]===tdrv){last=j;break;}}
          insertAt = last+1;
        }
        _planStops.splice(insertAt,0,dragged);
        _planAssign[_planDragId]=tdrv;
        _planDragId=null; _planDropTarget=null;
        _paintPlanGrid();
      });
    });
    const sp = row.insertCell(); sp.style.cssText='border:1px solid #e5e7eb;background:#f9fafb;width:44px';
  }

  // ── FOOTER: dispatcher names (click to edit) ──
  const tfoot = document.createElement('tfoot');
  const fRow = tfoot.insertRow();
  allDrivers.forEach((driver, i) => {
    const td = document.createElement('td');
    const di = _planDrivers.indexOf(driver);
    const dispName = (di >= 0 && dispatchers[di]) ? dispatchers[di] : '—';
    td.style.cssText = 'background:#1a1a2e;color:#fff;border:2px solid #111;padding:6px 8px;font-weight:700;font-size:12px;text-align:center;cursor:pointer';
    td.textContent = dispName;
    td.title = 'Click to edit dispatcher';
    td.addEventListener('click', function() {
      const n = prompt('Edit dispatcher name:', this.textContent);
      if (n === null) return;
      this.textContent = n.trim() || '—';
      while (dispatchers.length <= di) dispatchers.push('—');
      dispatchers[di] = n.trim() || '—';
      if (_weeklyTemplate) _weeklyTemplate.dispatchers = dispatchers;
    });
    fRow.appendChild(td);
  });
  const fs = document.createElement('td');
  fs.style.cssText='background:#1a1a2e;border:2px solid #111;width:44px'; fRow.appendChild(fs);
  table.appendChild(tfoot);
  wrapper.appendChild(table);

  const planBody = document.getElementById('plan-body');
  const existingMsg = planBody ? planBody.querySelector('#plan-msg') : null;
  const msgHtml = existingMsg ? existingMsg.outerHTML : '<div id="plan-msg"></div>';
  if (planBody) {
    planBody.innerHTML = msgHtml+'<div id="plan-table-wrap"></div>'+
      '<div style="margin-top:8px;font-size:12px;color:#6b7280">&#9998; click dispatcher to edit &nbsp;|&nbsp; click driver name to rename &nbsp;|&nbsp; drag any cell to move &nbsp;|&nbsp; &#10005; removes stop</div>';
    document.getElementById('plan-table-wrap').appendChild(wrapper);
  }
}

async function planSaveToApp() {
  if (_planStops.length === 0) { alert('Load orders first'); return; }
  const btn = event.target; btn.disabled=true; btn.textContent='Saving…';
  try {
    const assignments = _planStops.map(s => ({
      branchId: s.branchId, company: s.company, address: s.address,
      postCode: s.postCode, city: s.city||'', deliveryInfo: s.deliveryInfo||'',
      orderCount: s.orderCount||1, courier: _planAssign[s.branchId]||'Unassigned',
      notes: _planNotes[s.branchId]||null, isManual: s.isManual||false,
      hasOrder: s.hasOrder!==false,
    }));

    // Always save to Firestore (cloud mode primary storage)
    if (window._fbReady && window._fbDb) {
      await window._fbSetDoc(window._fbDoc(window._fbDb, 'dailyPlans', _planDate + '_' + _planKitchen), {
        date: _planDate, kitchen: _planKitchen,
        savedAt: new Date().toISOString(),
        assignments,
        notes: _planNotes,
        drivers: _planDrivers,
      });
    }

    // Also try local server if configured
    if (API_BASE) {
      const r = await fetch(`${API_BASE}/api/planning/save`, {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ date:_planDate, kitchen:_planKitchen, assignments }),
      });
      const d = await r.json();
      if(!r.ok) throw new Error(d.error||'Failed');
    }

    const el = document.getElementById('plan-msg');
    if(el) el.innerHTML='<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:10px 14px;font-size:13px;color:#16a34a;margin-bottom:8px">✅ Plan saved to Firebase for '+_planDate+' ('+_planKitchen+')</div>';
  } catch(e) { alert('Save error: '+e.message); }
  btn.disabled=false; btn.textContent='💾 Save → Driver App';
}

function clearAndReload(e) {

  if (window._fbReady && window._fbDb) {

  loadFromWeeklyTemplate(bodyEl);
}

async function checkPickups() {
  if (!window._fbReady || !window._fbDb) { alert('Firebase not ready'); return; }
  const btn = event.target; btn.disabled=true; btn.textContent='Checking…';

  const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const todayDate  = new Date(_planDate + 'T12:00:00');
  const yestDate   = new Date(todayDate); yestDate.setDate(yestDate.getDate()-1);
  const tmrwDate   = new Date(todayDate); tmrwDate.setDate(tmrwDate.getDate()+1);
  const todayDay   = DAY_NAMES[todayDate.getDay()];
  const yestDay    = DAY_NAMES[yestDate.getDay()];
  const tmrwDay    = DAY_NAMES[tmrwDate.getDay()];

  try {
    // Load templates for yesterday, today, tomorrow
    const [ySnap, tSnap, mSnap] = await Promise.all([
      window._fbGetDoc(window._fbDoc(window._fbDb,'weeklyTemplates',yestDay)),
      window._fbGetDoc(window._fbDoc(window._fbDb,'weeklyTemplates',todayDay)),
      window._fbGetDoc(window._fbDoc(window._fbDb,'weeklyTemplates',tmrwDay)),
    ]);

    const yest  = ySnap.exists()  ? ySnap.data()  : null;
    const today = tSnap.exists()  ? tSnap.data()  : null;
    const tmrw  = mSnap.exists()  ? mSnap.data()  : null;

    if (!yest) { alert('No template found for ' + yestDay + '. Cannot determine pickups.'); btn.disabled=false; btn.textContent='📦 Check Pickups'; return; }

    // All companies that had delivery YESTERDAY
    const yestCompanies = new Set(Object.values(yest.routes||{}).flat().map(c=>c.toLowerCase().trim()));
    // Companies delivering TODAY (no pickup needed — driver collects when delivering)
    const todayCompanies = new Set(Object.values((today&&today.routes)||{}).flat().map(c=>c.toLowerCase().trim()));
    // Companies delivering TOMORROW (no pickup needed — wait for tomorrow's driver)
    const tmrwCompanies  = new Set(Object.values((tmrw&&tmrw.routes)||{}).flat().map(c=>c.toLowerCase().trim()));

    // PICKUP NEEDED: had delivery yesterday AND not today AND not tomorrow
    const pickupNeeded = [];
    yestCompanies.forEach(comp => {
      if (!comp.startsWith('pickup') && !todayCompanies.has(comp) && !tmrwCompanies.has(comp)) {
        // Find full name from yesterday's template
        const fullName = Object.values(yest.routes||{}).flat().find(c=>c.toLowerCase().trim()===comp) || comp;
        pickupNeeded.push(fullName);
      }
    });

    if (pickupNeeded.length === 0) {
      alert('No pickups needed for ' + todayDay + '. All companies from ' + yestDay + ' are ordering today or tomorrow.');
      btn.disabled=false; btn.textContent='📦 Check Pickups'; return;
    }

    // Show pickup modal
    const existing = document.getElementById('pickup-modal');
    if (existing) existing.remove();
    const mo = document.createElement('div');
    mo.className = 'modal-overlay'; mo.id = 'pickup-modal';
    mo.innerHTML =
      '<div class="modal" style="width:min(600px,95vw);max-height:85vh;overflow-y:auto">' +
        '<button class="modal-close" onclick="this.closest(\'.modal-overlay\').remove()">×</button>' +
        '<h3>📦 Box Pickup Needed — ' + todayDay + '</h3>' +
        '<p style="font-size:13px;color:#6b7280;margin-bottom:12px">These companies had delivery on <b>' + yestDay + '</b> but are <b>not ordering today or tomorrow</b> — driver must collect empty boxes:</p>' +
        '<div style="display:flex;flex-direction:column;gap:6px;margin-bottom:16px">' +
        pickupNeeded.map((c,i) => {
          const safeC = c.replace(/'/g,'\'');
          return '<div style="display:flex;align-items:center;justify-content:space-between;background:#fef9c3;border:1px solid #fde68a;border-radius:6px;padding:8px 12px">' +
            '<span style="font-size:13px;font-weight:600">📦 ' + c + '</span>' +
            '<select onchange="if(this.value)addPickupStop(\'' + safeC + '\',this.value)" style="border:1px solid #d1d5db;border-radius:5px;padding:4px 8px;font-size:12px">' +
            '<option value="">Assign to driver…</option>' +
            _planDrivers.filter(d=>d!=='Unassigned').map(d=>'<option value="'+d+'">'+d+'</option>').join('') +
            '</select>' +
          '</div>';
        }).join('') +
        '</div>' +
        '<div style="font-size:12px;color:#6b7280">💡 Select a driver for each pickup to add it to their route. Then drag to the correct position.</div>' +
      '</div>';
    document.body.appendChild(mo);
  } catch(e) { alert('Error: '+e.message); }
  btn.disabled=false; btn.textContent='📦 Check Pickups';
}

function planExportExcel() {
  if (_planStops.length === 0) { alert('Load orders first'); return; }
  if (typeof XLSX === 'undefined') { alert('SheetJS not loaded — make sure you\'re connected to the internet'); return; }

  const wb = XLSX.utils.book_new();
  const date = new Date(_planDate);
  const dayName = date.toLocaleDateString('de-DE',{weekday:'long'});

  // Build the column-per-driver layout matching DiversPotsdam.xlsx format
  const drivers = _planDrivers.filter(d=>d!=='Unassigned');
  const stopsByDriver = {};
  drivers.forEach(d => { stopsByDriver[d] = _planStops.filter(s=>_planAssign[s.branchId]===d); });

  const maxRows = Math.max(...drivers.map(d => stopsByDriver[d].length));

  // Rows: 0-3 empty, row 4 = driver headers, row 5+ = stops
  const data = [];
  for (let i=0;i<4;i++) data.push(new Array(drivers.length).fill(''));
  data.push(drivers); // Row 4 = headers
  for (let r=0;r<maxRows+2;r++) {
    const row = drivers.map((d,ci) => {
      const stops = stopsByDriver[d];
      const s = stops[r];
      if (!s) return '';
      const sn = shortName(s.company);
      const note = _planNotes[s.branchId];
      return note ? `${sn} — ${note}` : sn;
    });
    data.push(row);
  }

  // Red plates section
  data.push(new Array(drivers.length).fill(''));
  data.push(['DON\'T FORGET THE RED PLATES BITTE', ...new Array(drivers.length-1).fill('')]);
  data.push(['Red hot plates for mandatory use in these companies', ...new Array(drivers.length-1).fill('')]);

  const ws = XLSX.utils.aoa_to_sheet(data);

  // Column widths
  ws['!cols'] = drivers.map(()=>({wch:22}));

  // Style driver headers (row 4 = index 4, Excel row 5)
  drivers.forEach((d,ci) => {
    const cell = XLSX.utils.encode_cell({r:4, c:ci});
    if (!ws[cell]) ws[cell] = {v:d};
    ws[cell].s = {
      font: {bold:true, underline:true, sz:14},
      fill: {fgColor:{rgb: (DRIVER_COLORS[d]||'#f3f4f6').replace('#','')}, patternType:'solid'},
      alignment: {horizontal:'center'},
      border: {bottom:{style:'thin',color:{rgb:'000000'}}}
    };
  });

  // Style notes (pickup rows etc.)
  _planStops.forEach(s => {
    if (_planNotes[s.branchId]) {
      const d = _planAssign[s.branchId];
      const ci = drivers.indexOf(d);
      const stops = stopsByDriver[d];
      const ri = stops.findIndex(x=>x.branchId===s.branchId);
      if (ci>=0 && ri>=0) {
        const cell = XLSX.utils.encode_cell({r:5+ri, c:ci});
        if (ws[cell]) ws[cell].s = {font:{color:{rgb:'7C3AED'}, italic:true}};
      }
    }
  });

  XLSX.utils.book_append_sheet(wb, ws, dayName);

  // Add a second sheet: detailed stop list with addresses + contact info
  const detailData = [['Driver','Company','Short Name','Address','Postal','City','Orders','Contact Info','Notes']];
  drivers.forEach(d => {
    stopsByDriver[d].forEach(s => {
      detailData.push([d, s.company, shortName(s.company), s.address, s.postCode, s.city, s.orderCount,
        (s.deliveryInfo||'').split('\n')[0]||'', _planNotes[s.branchId]||'']);
    });
  });
  const ws2 = XLSX.utils.aoa_to_sheet(detailData);
  ws2['!cols'] = [12,30,20,25,8,12,8,30,20].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, ws2, 'Details');

  const fileName = `BellaBona_${_planKitchen}_${_planDate}.xlsx`;
  XLSX.writeFile(wb, fileName);
}

function parseOmsJson(raw) {
  const data = JSON.parse(raw);
  return data.map(branch => {
    const totalBoxes = branch.boxes ? branch.boxes.length : 0;
    const uniqueUsers = new Set();
    (branch.boxes||[]).forEach(box => {
      (box.dishes||[]).forEach(dish => {
        (dish.users||[]).forEach(u => { if(u.orderedQuantity>0) uniqueUsers.add(u.id); });
      });
    });
    const dishes = [];
    (branch.boxes||[]).forEach(box => {
      (box.dishes||[]).forEach(dish => {
        dishes.push({ name:dish.name, label:dish.label, type:box.type, size:box.size,
          count:(dish.users||[]).reduce((s,u)=>s+(u.orderedQuantity||0),0) });
      });
    });
    return {
      branchId:    branch.id,
      company:     branch.name,
      address:     branch.deliveryAddress || '',
      postCode:    branch.deliveryPostalCode || '',
      city:        branch.deliveryCity || '',
      deliveryInfo: branch.deliveryInstructions || '',
      orderCount:  totalBoxes,
      userCount:   uniqueUsers.size,
      readyTime:   branch.readyTime,
      leaveTime:   branch.leaveTime,
      boxes:       branch.boxes || [],
      dishes:      dishes,
    };
  });
}

function previewJsonImport() {
  const raw = document.getElementById('json-paste-area').value.trim();

}

async function importJsonData() {

function _initTrialMap(progress) {
  const c = document.getElementById('trial-map');
  if(!c||typeof L==='undefined') return;
  if(_trialMap){_trialMap.remove();_trialMap=null;}
  _trialMarkers = {};
  _trialMap = L.map('trial-map').setView([52.52,13.4],11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; OpenStreetMap',maxZoom:18}).addTo(_trialMap);

  // Depot marker
  L.marker([52.3906,13.0645],{
    icon:L.divIcon({className:'',html:'<div style="background:#1d4ed8;color:#fff;border-radius:6px;padding:3px 7px;font-size:10px;font-weight:700;white-space:nowrap">🏭 Berlin Depot</div>',iconAnchor:[40,10]})
  }).addTo(_trialMap).bindPopup('Berlin Depot — Friedrich-Engels-Str. 22, Potsdam');

  // GPS / stop markers
  _updateTrialMapMarkers(progress);

  // Socket.io live GPS
  try {
    if(typeof io!=='undefined') {
      const sock = io(API_BASE,{transports:['websocket'],reconnectionAttempts:3});
      sock.on('connect',()=>{const b=document.getElementById('trial-live-badge');if(b)b.style.display='inline-flex';});
      sock.on('gps_update',function(data){
        const lat=data.latitude||data.lat, lng=data.longitude||data.lng;
        const id=data.driverId||data.id, name=data.driverName||data.name||'?';
        if(!lat||!lng||!_trialMap) return;
        const initials=name.substring(0,2).toUpperCase();
        if(_trialMarkers['gps_'+id]) {
          _trialMarkers['gps_'+id].setLatLng([lat,lng]);
        } else {
          const icon=L.divIcon({className:'',html:'<div style="background:#f97316;color:#fff;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.4)">'+initials+'</div>',iconSize:[32,32],iconAnchor:[16,16]});
          _trialMarkers['gps_'+id]=L.marker([lat,lng],{icon}).addTo(_trialMap).bindPopup('<b>'+name+'</b><br>GPS live');
        }
      });
    }
  } catch(e){}
}

function _updateTrialMapMarkers(progress) {
  if(!_trialMap) return;
  const driverColors=['#e85d04','#3b82f6','#10b981','#8b5cf6','#f59e0b'];
  (progress||[]).forEach((r,i) => {
    const color = driverColors[i%driverColors.length];
    if(r.lastGps) {
      const lat=r.lastGps.latitude||r.lastGps.lat, lng=r.lastGps.longitude||r.lastGps.lng;
      if(lat&&lng) {
        const initials=(r.courierName||'?').substring(0,2).toUpperCase();
        if(_trialMarkers['drv_'+r.routeId]) {
          _trialMarkers['drv_'+r.routeId].setLatLng([lat,lng]);
        } else {
          const icon=L.divIcon({className:'',html:'<div style="background:'+color+';color:#fff;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.3)">'+initials+'</div>',iconSize:[32,32],iconAnchor:[16,16]});
          _trialMarkers['drv_'+r.routeId]=L.marker([lat,lng],{icon}).addTo(_trialMap).bindPopup('<b>'+r.courierName+'</b><br>'+r.delivered+'/'+r.totalStops+' stops done');
        }
      }
    }
    // Mark stops
    (r.stops||[]).forEach((s,j)=>{
      if(!s.postalCode) return;
      // We won't geocode here — just show placeholder if no GPS
    });
  });
}

async function renderOrders() {
  if(ordersLoading) return;
  const c = document.getElementById('content');
  c.innerHTML = '<div class="page"><div style="padding:60px;text-align:center;color:#9ca3af">Loading orders…</div></div>';
  ordersLoading = true;
  try {
    const qs = new URLSearchParams({date:ordersFilter.date});
    if(ordersFilter.kitchen!=='all') qs.set('kitchen',ordersFilter.kitchen);
    if(ordersFilter.courier!=='all') qs.set('courier',ordersFilter.courier);
    if(ordersFilter.search) qs.set('search',ordersFilter.search);
    if(ordersFilter.status!=='all') qs.set('status',ordersFilter.status);
    const r = await fetch(`${API_BASE}/api/orders/flat?${qs}`);
    const d = await r.json();
    ordersData = d.orders || [];
  } catch(e) {
    ordersData = [];
  }
  ordersLoading = false;
  _paintOrders();
}

  const all = ordersData;
  const del = all.filter(o=>o.status==='delivered').length;
  const fail= all.filter(o=>o.status==='failed').length;
  const pend= all.filter(o=>!['delivered','failed'].includes(o.status)).length;
  const late= all.filter(o=>o.isLate).length;
  const couriers = [...new Set(all.map(o=>o.courierName))].sort();

  document.getElementById('content').innerHTML =
  '<div class="page">' +
  '<div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between">' +
    '<div><h2>Orders</h2><p>'+all.length+' stops for '+ordersFilter.date+'</p></div>' +
    '<div style="display:flex;gap:8px">' +
      '<button class="btn btn-sm" onclick="openImportModal()">⬆ Import CSV</button>' +
      '<button class="btn btn-sm" onclick="openServiceTimesModal()">⏱ Service Times</button>' +
      '<a href="'+API_BASE+'/api/orders/export/csv?date='+ordersFilter.date+(ordersFilter.kitchen!=='all'?'&kitchen='+ordersFilter.kitchen:'')+'" class="btn btn-sm">⬇ Export CSV</a>' +
    '</div>' +
  '</div>' +
  '<div class="grid-auto" style="margin-bottom:16px">' +
    '<div class="stat-card"><div class="stat-label">Total</div><div class="stat-value">'+all.length+'</div></div>' +
    '<div class="stat-card"><div class="stat-label">Delivered</div><div class="stat-value" style="color:#16a34a">'+del+'</div></div>' +
    '<div class="stat-card"><div class="stat-label">Pending</div><div class="stat-value" style="color:#d97706">'+pend+'</div></div>' +
    '<div class="stat-card"><div class="stat-label">Failed</div><div class="stat-value" style="color:#dc2626">'+fail+'</div></div>' +
    '<div class="stat-card"><div class="stat-label">Late ETA</div><div class="stat-value" style="color:'+(late>0?'#dc2626':'#111')+'">'+late+'</div></div>' +
  '</div>' +

    '<input type="date" value="'+ordersFilter.date+'" onchange="ordersFilter.date=this.value;renderOrders()">' +
    '<select onchange="ordersFilter.status=this.value;renderOrders()">'+
      '<option value="all"'+(ordersFilter.status==='all'?' selected':'')+'>All Statuses</option>'+
      ['pending','arrived','delivered','failed'].map(s=>'<option value="'+s+'"'+(ordersFilter.status===s?' selected':'')+'>'+s.charAt(0).toUpperCase()+s.slice(1)+'</option>').join('')+
    '</select>' +

      '<option value="all">All Kitchens</option>'+
      ['Munich','Berlin'].map(k=>'<option value="'+k+'"'+(ordersFilter.kitchen===k?' selected':'')+'>'+k+'</option>').join('')+
    '</select>' +
    '<select onchange="ordersFilter.courier=this.value;renderOrders()">'+

    '</select>' +

async function openOD(orderId, source) {
  openPanel('Loading…','<div style="padding:40px;text-align:center;color:#9ca3af">Loading order detail…</div>');
  try {
    const r = await fetch(`${API_BASE}/api/orders/`+encodeURIComponent(orderId));
    if(!r.ok) throw new Error('Not found');
    const o = await r.json();
    const tl = o.timeline || [];
    const statusColor = {delivered:'#16a34a',failed:'#dc2626',arrived:'#3b82f6',pending:'#f59e0b',ordered:'#6b7280',picked_up:'#8b5cf6'};
    const statusLabel = {delivered:'Delivered',failed:'Failed',arrived:'Arrived at stop',pending:'Pending',ordered:'Order created',picked_up:'Picked up from kitchen'};
    const body =
    '<div style="display:flex;flex-direction:column;gap:14px">' +
    '<div class="card-sm">' +
      '<div class="section-title">Order Details</div>' +
      '<table style="width:100%;font-size:13px">' +
        (o.tiramizooId?'<tr><td style="color:#6b7280;padding:4px 0;width:120px">Tiramizoo ID</td><td><code style="background:#f3f4f6;padding:1px 5px;border-radius:3px">'+o.tiramizooId+'</code></td></tr>':'')+
        '<tr><td style="color:#6b7280;padding:4px 0">Source</td><td><span class="badge '+(o.source==='imported'?'badge-blue':'badge-gray')+'">'+o.source+'</span></td></tr>'+
        '<tr><td style="color:#6b7280;padding:4px 0">Company</td><td><b>'+o.companyName+'</b></td></tr>'+
        (o.pickupAddress?'<tr><td style="color:#6b7280;padding:4px 0">Pickup</td><td>'+o.pickupAddress+'</td></tr>':'')+
        '<tr><td style="color:#6b7280;padding:4px 0">Delivery</td><td>'+o.address+', '+o.postCode+' '+o.city+'</td></tr>'+
        (o.contactInfo?'<tr><td style="color:#6b7280;padding:4px 0">Contact</td><td>'+o.contactInfo+'</td></tr>':'')+
        '<tr><td style="color:#6b7280;padding:4px 0">Time Window</td><td>'+(o.windowStart&&o.windowEnd?new Date(o.windowStart).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})+' – '+new Date(o.windowEnd).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}):'—')+'</td></tr>'+
        (o.eta?'<tr><td style="color:#6b7280;padding:4px 0">ETA</td><td>'+new Date(o.eta).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})+'</td></tr>':'')+
        '<tr><td style="color:#6b7280;padding:4px 0">Packages</td><td>'+o.boxCount+' boxes · '+o.weightKg+'kg</td></tr>'+
        '<tr><td style="color:#6b7280;padding:4px 0">Status</td><td>'+badge(o.status)+'</td></tr>'+
        '<tr><td style="color:#6b7280;padding:4px 0">Courier</td><td>'+o.courierName+'</td></tr>'+
        (o.localNotes?'<tr><td style="color:#6b7280;padding:4px 0">Notes</td><td>'+o.localNotes+'</td></tr>':'')+
      '</table>' +
    '</div>' +
    (tl.length>0?
    '<div class="card-sm"><div class="section-title">Status Timeline</div>' +
    tl.map((t,idx)=>{
      const isDone = idx<tl.length-1 || ['delivered','failed'].includes(o.status);
      const color = statusColor[t.status]||'#6b7280';
      const lbl = statusLabel[t.status]||t.status;
      const atStr = t.at ? new Date(t.at).toLocaleString('de-DE',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
      return '<div class="timeline-item">' +
        '<div class="timeline-dot" style="background:'+(isDone?color:'#d1d5db')+'"></div>' +
        '<div><div class="timeline-title" style="color:'+(isDone?'#111827':'#9ca3af')+'">'+lbl+'</div>' +
        '<div class="timeline-time">'+(atStr||(t.changedBy||''))+'</div></div></div>';
    }).join('')+
    '</div>':'') +
    (o.packageDetails&&o.packageDetails.length>0?
    '<div class="card-sm"><div class="section-title">Package Details</div>' +
    o.packageDetails.map((p,i)=>'<div style="font-size:13px;padding:4px 0;border-bottom:1px solid #f3f4f6">'+
      'Box '+(i+1)+': '+(p.width||'?')+'×'+(p.height||'?')+'×'+(p.length||'?')+'cm · '+(p.weight||14)+'kg</div>').join('')+
    '</div>':'') +
    '</div>';
    openPanel((o.tiramizooId||o.orderId)+' – '+o.companyName, body);
  } catch(e) {
    openPanel('Error','<div style="padding:20px;color:#dc2626">'+e.message+'</div>');
  }
}

      '<div style="font-size:13px;font-weight:500;margin-bottom:8px" id="csv-count"></div>' +

      '<div style="margin-top:12px;display:flex;gap:8px">' +
        '<button class="btn btn-primary" onclick="submitCsvImport()">Import Orders</button>' +
        '<button class="btn" onclick="document.getElementById(\'csv-preview\').style.display=\'none\';window._csvText=null">Clear</button>' +
      '</div>' +
    '</div>' +

  '</div>';

window._csvText = null;
window._csvRows = [];

function parseCsvPreview(text) {
  window._csvText = text;
  const lines = text.split('\n').map(l=>l.trim()).filter(Boolean);
  if(lines.length<2){alert('CSV must have at least one data row.');return;}
  const header = lines[0].split(',');
  const rows = lines.slice(1,Math.min(lines.length,11)).map(l=>l.split(','));
  window._csvRows = rows;
  document.getElementById('csv-count').textContent = (lines.length-1)+' rows to import (showing first '+rows.length+')';
  document.getElementById('csv-table-wrap').innerHTML =
    '<table><thead><tr>'+header.map(h=>'<th>'+h+'</th>').join('')+'</tr></thead><tbody>'+
    rows.map(r=>'<tr>'+r.map(c=>'<td style="font-size:12px">'+c+'</td>').join('')+'</tr>').join('')+
    '</tbody></table>';
  document.getElementById('csv-preview').style.display='block';
}

function handleCsvDrop(event) {
  event.preventDefault();
  document.getElementById('csv-drop').style.borderColor='#d1d5db';
  const file = event.dataTransfer.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => parseCsvPreview(e.target.result);
  reader.readAsText(file);
}

function handleCsvFile(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => parseCsvPreview(e.target.result);
  reader.readAsText(file);
}

async function submitCsvImport() {
  if(!window._csvText) return;
  const btn = document.querySelector('.modal .btn-primary');
  btn.textContent='Importing…';btn.disabled=true;
  try {
    const r = await fetch(`${API_BASE}/api/orders/import`,{
      method:'POST',
      headers:{'Content-Type':'text/plain'},
      body:window._csvText
    });
    const d = await r.json();
    document.getElementById('csv-result').style.display='block';
    document.getElementById('csv-result').innerHTML =
      d.ok
      ?'<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:12px;font-size:13px">'+
        '✅ Imported <b>'+d.imported+'</b> orders (batch: <code>'+d.batchId+'</code>)'+
        (d.errors.length?'<br><span style="color:#dc2626">'+d.errors.length+' errors: '+d.errors.slice(0,3).join(', ')+'</span>':'')+
        '</div>'
      :'<div style="color:#dc2626;font-size:13px">Error: '+(d.error||'Unknown')+'</div>';
    if(d.ok) { window._csvText=null; document.getElementById('csv-preview').style.display='none'; renderOrders(); }
  } catch(e) {
    document.getElementById('csv-result').style.display='block';
    document.getElementById('csv-result').innerHTML='<div style="color:#dc2626">'+e.message+'</div>';
  }
  btn.textContent='Import Orders';btn.disabled=false;
}

async function saveServiceTime() {

  const desc   = document.getElementById('st-desc').value.trim();

  await fetch(`${API_BASE}/api/orders/service-times/${encodeURIComponent(prefix)}`,{
    method:'PUT',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({service_time_s:secs,city,description:desc})
  });
  await loadServiceTimes();
}

async function deleteServiceTime(prefix) {
  if(!confirm('Delete zone '+prefix+'?')) return;
  await fetch(`${API_BASE}/api/orders/service-times/${encodeURIComponent(prefix)}`,{method:'DELETE'});
  await loadServiceTimes();
}

async function renderShifts() {
  document.getElementById('content').innerHTML = '<div class="page"><div style="padding:60px;text-align:center;color:#9ca3af">Loading availability…</div></div>';

  // Load drivers
  const allDrivers = window._allDrivers || [];
  // Load shift data from Firestore
  let shiftMap = {};
  if (window._fbReady && window._fbDb) {
    try {
      const { getDocs } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
      const snap = await getDocs(window._fbCollection(window._fbDb,'driverShifts'));
      snap.forEach(d => { shiftMap[d.id] = d.data(); });
    } catch(e) {}
  }

  const DAYS = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
  const cityDrivers = allDrivers.filter(d => d.city === _courierCity);

  const rows = cityDrivers.length > 0 ? cityDrivers : [
    {id:'samir',name:'Samir'},{id:'ali1',name:'Ali1'},{id:'ali2',name:'Ali2'},
    {id:'martin',name:'Martin'},{id:'packator1',name:'Packator1'},{id:'packator2',name:'Packator2'},
    {id:'piyush',name:'Piyush'},{id:'mykhaielo',name:'Mykhaielo'},{id:'jozef',name:'Jozef'},{id:'tasnim',name:'Tasnim'},
  ];

  let tableHtml =
    '<table style="width:100%;border-collapse:collapse;min-width:700px">' +
    '<thead><tr style="background:#1a1a2e;color:#fff">' +
      '<th style="padding:10px 14px;font-size:13px;text-align:left;border:1px solid #374151;min-width:120px">Driver</th>' +
      DAYS.map(d=>'<th style="padding:10px 10px;font-size:12px;text-align:center;border:1px solid #374151;min-width:80px">'+d+'</th>').join('') +
    '</tr></thead><tbody>';

  rows.forEach((driver, ri) => {
    const shifts = shiftMap[driver.id] || {};
    tableHtml += '<tr style="border-bottom:1px solid #f3f4f6;background:'+(ri%2===0?'#fff':'#fafafa')+'">' +
      '<td style="padding:8px 14px;font-weight:600;font-size:13px;border-right:2px solid #e5e7eb">' +
        '<div style="display:flex;align-items:center;gap:8px">' +
          '<div style="width:28px;height:28px;border-radius:50%;background:#e85d0420;color:#e85d04;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700">'+(driver.name||'?').substring(0,2).toUpperCase()+'</div>' +
          (driver.name||'—') +
        '</div></td>';
    DAYS.forEach(day => {
      const isOn = shifts[day] !== false && (shifts[day] === true || Object.keys(shifts).length === 0);
      tableHtml += '<td style="padding:8px;text-align:center;border:1px solid #f3f4f6">' +
        '<input type="checkbox"'+(isOn?' checked':'')+' data-driver="'+driver.id+'" data-day="'+day+'"' +
        ' onchange="saveShift(\''+driver.id+'\',\''+day+'\',this.checked)"' +
        ' style="width:18px;height:18px;cursor:pointer;accent-color:#e85d04"></td>';
    });
    tableHtml += '</tr>';
  });

  // Summary row
  tableHtml += '<tr style="background:#f0fdf4;font-weight:700">' +
    '<td style="padding:8px 14px;font-size:12px;border-right:2px solid #e5e7eb">Total Available</td>' +
    DAYS.map(day => {
      const count = rows.filter(d => {
        const s = shiftMap[d.id] || {};
        return s[day] !== false && (s[day] === true || Object.keys(s).length === 0);
      }).length;
      return '<td style="padding:8px;text-align:center;font-size:13px;border:1px solid #e5e7eb;color:#16a34a">'+count+'</td>';
    }).join('') +
    '</tr>';

  tableHtml += '</tbody></table>';

  document.getElementById('content').innerHTML =
  '<div class="page">' +
  '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px">' +
    '<div><h2 style="font-size:22px;font-weight:700">⏰ Weekly Availability</h2>' +
    '<p style="color:#6b7280;font-size:14px">Set which drivers work on which days. Changes save automatically.</p></div>' +
    '<select onchange="_courierCity=this.value;renderShifts()" style="border:1px solid #d1d5db;border-radius:7px;padding:6px 12px;font-size:13px">' +
      '<option'+ (_courierCity==='Berlin'?' selected':'') +'>Berlin</option>' +
      '<option'+ (_courierCity==='Munich'?' selected':'') +'>Munich</option>' +
    '</select>' +
  '</div>' +
  '<div style="overflow-x:auto;background:#fff;border-radius:8px;border:1px solid #e5e7eb;padding:0">' +
    tableHtml +
  '</div>' +
  '<p style="margin-top:10px;font-size:12px;color:#9ca3af">✅ checked = driver works that day &nbsp;·&nbsp; Changes saved to Firebase automatically</p>' +
  '</div>';
}

async function saveShift(driverId, day, value) {
  if (!window._fbReady || !window._fbDb) return;
  await window._fbSetDoc(
    window._fbDoc(window._fbDb, 'driverShifts', driverId),
    {[day]: value, updatedAt: new Date().toISOString()},
    {merge: true}
  ).catch(e => console.warn('Shift save error:', e));
}

async function triggerRoutePlan(scheduleName) {
  if(!confirm('Trigger route plan calculation for "'+scheduleName+'"?\n\nThis will call VROOM to optimize routes for tomorrow.')) return;
  const btn = event.target;
  btn.textContent='Calculating…';btn.disabled=true;
  try {
    const today = new Date();
    today.setDate(today.getDate()+1);
    const date = today.toISOString().split('T')[0];
    const r = await fetch(`${API_BASE}/api/route-plans`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({delivery_date:date,schedule_name:scheduleName})
    });
    const d = await r.json();
    if(d.ok || d.plan_code) {
      alert('✅ Route plan triggered!\nPlan ID: '+(d.plan_code||d.id||'—')+'\nDate: '+date+'\n\nGo to Route Plans to view the result.');
      window.location.hash='#route-plans';
    } else {
      alert('Route plan queued for '+date+'. Check Route Plans page.\n\n'+(d.error||''));
    }
  } catch(e) {
    alert('Could not reach the backend: '+e.message+'\n\nMake sure the server is running.');
  }
  btn.textContent='▶ Run route plan calculation';btn.disabled=false;
}

function initZipMap() {
  const c = document.getElementById('zip-map');
  if(!c||typeof L==='undefined') return;
  if(zipMap){zipMap.remove();zipMap=null;}
  const center = zipKitchen==='Munich' ? [48.15,11.58] : [52.51,13.39];
  const zoom   = zipKitchen==='Munich' ? 11 : 11;
  zipMap = L.map('zip-map').setView(center, zoom);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; OpenStreetMap',maxZoom:18}).addTo(zipMap);

  // Plot API zones as circles (size = stop count)
  if(zipZones.length > 0) {
    zipZones.forEach(z => {
      if(!z.lat || !z.lng) return;
      const r = Math.max(400, Math.min(1400, z.total * 120));
      const fill = z.total >= 9 ? '#fca5a5' : z.total >= 4 ? '#fed7aa' : '#fef9c3';
      const stroke = z.total >= 9 ? '#dc2626' : z.total >= 4 ? '#ea580c' : '#d97706';
      L.circle([z.lat,z.lng],{radius:r,fillColor:fill,color:stroke,weight:1.5,fillOpacity:0.65})
        .addTo(zipMap)
        .bindPopup('<b>'+z.postalCode+'</b> '+z.city+'<br>'+z.total+' stops · '+z.delivered+' delivered<br>Service time: '+Math.round(z.serviceTimeS/60)+'min');
      L.marker([z.lat,z.lng],{icon:L.divIcon({className:'',html:'<div style="background:#1d4ed8;color:#fff;font-size:10px;font-weight:700;padding:1px 5px;border-radius:4px;white-space:nowrap;opacity:0.9">'+z.postalCode+' ('+z.total+')</div>',iconAnchor:[28,10]})}).addTo(zipMap);
    });
  } else {
    // Fall back to MUNICH_ZIPS static data
    const isM = zipKitchen==='Munich';
    if(isM) {

// ALERTS
// ============================================================
let alertsData = [];

async function renderAlerts() {
  document.getElementById('content').innerHTML =
  '<div class="page"><div style="padding:60px;text-align:center;color:#9ca3af">Checking for alerts…</div></div>';
  try {
    const r = await fetch(`${API_BASE}/api/alerts`);
    const d = await r.json();
    alertsData = d.alerts||[];
    _paintAlerts(d);
  } catch(e) {
    // Fall back to static demo alerts if API offline
    alertsData = alerts.filter(a=>!a.dismissed).map(a=>({hash:String(a.id),type:a.severity,severity:a.severity,title:a.title,detail:a.meta}));
    _paintAlerts({visible:alertsData.length,dismissed:[]});
  }
}

function _paintAlerts(d) {
  const sev = {error:'🔴',warning:'🟡',info:'🔵',gps:'📡',late:'⏰',failed:'❌',closure:'🚫',region_closure:'⚠️'};
  const sevColor = {error:'#fee2e2',warning:'#fef3c7',info:'#dbeafe'};
  document.getElementById('content').innerHTML =
  '<div class="page">' +
  '<div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between">' +
    '<div><h2>Alerts</h2><p>'+alertsData.length+' active alert'+(alertsData.length!==1?'s':'')+'</p></div>' +
    '<div style="display:flex;gap:8px">' +
      '<button class="btn btn-sm" onclick="renderAlerts()">↻ Refresh</button>' +
      ((d.dismissed&&d.dismissed.length>0)?'<button class="btn btn-sm" onclick="restoreAlerts()">Restore dismissed ('+d.dismissed.length+')</button>':'') +
    '</div>' +
  '</div>' +
  (alertsData.length===0?'<div class="card" style="text-align:center;padding:48px;color:#9ca3af"><div style="font-size:32px;margin-bottom:8px">✅</div>No active alerts — all good!</div>':'') +
  alertsData.map(a=>{
    const icon = sev[a.type]||sev[a.severity]||'🔔';
    const bg   = sevColor[a.severity]||'#f3f4f6';
    return '<div class="alert-item '+a.severity+'" style="background:'+bg+';border-color:'+(a.severity==='error'?'#fecaca':a.severity==='warning'?'#fde68a':'#bfdbfe')+'">' +
      '<span style="font-size:22px;flex-shrink:0">'+icon+'</span>' +
      '<div class="alert-content">' +
        '<div class="alert-title">'+a.title+'</div>' +
        '<div class="alert-meta">'+(a.detail||a.kitchen||'')+'</div>' +
      '</div>' +
      '<button class="btn btn-sm" onclick="dismissAlert(\''+a.hash+'\')">Dismiss</button>' +
    '</div>';
  }).join('') +
  '</div>';
}

async function dismissAlert(hash) {
  await fetch(`${API_BASE}/api/alerts/dismiss`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({hash})});
  renderAlerts();
}

async function restoreAlerts() {
  await fetch(`${API_BASE}/api/alerts/dismissed`,{method:'DELETE'});
  renderAlerts();
}

    samirT8: g('samirT8'), samirExtra: g('samirExtra'), samirPickup: g('samirPickup'),
    aliT4: g('aliT4'), aliT5: g('aliT5'), aliT6: g('aliT6'), aliExtra: g('aliExtra'),

async function openWhatsAppReport() {
  if (!window._kpiCalc) { alert('Enter data and recalculate first'); return; }
  const date = document.getElementById('kpi-date')?.value || new Date().toLocaleDateString('en-CA');
  const c = window._kpiCalc;
  const totalRev = _v('kpi-totalRevenue') + _v('kpi-serviceFee');
  const meals = _v('kpi-meals');

  // Load history for weekly/monthly
  let records = [];
  if (window._fbReady && window._fbDb) {
    try {
      const { getDocs } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
      const snap = await getDocs(window._fbCollection(window._fbDb,'logisticKPI'));
      snap.forEach(d => { const data=d.data(); if(data.city==='Berlin') records.push(data); });
      records.sort((a,b)=>a.date.localeCompare(b.date));
    } catch(e) {}
  }
  const thisWeek = records.filter(r => {
    const d = new Date(r.date), today = new Date(date);
    const diff = (today-d)/(1000*60*60*24);
    return diff >= 0 && diff < 7;
  });
  const thisMonth = records.filter(r => r.date && r.date.substring(0,7) === date.substring(0,7));

  const fmt = n => '€'+(n||0).toFixed(0);
  const pct = (a,b) => b>0?(a/b*100).toFixed(1)+'%':'—';

  const dayMsg =
`📊 *BellaBona Berlin — Daily Report*
📅 *${date}*

💰 *Revenue:* ${fmt(totalRev)}
🍽️ Meals: ${meals} | Catering: ${fmt(_v('kpi-catering'))} | Add-ons: ${fmt(_v('kpi-addOns'))}
🚗 *Logistic Cost:* ${fmt(c.totalLogCost)}

function _waCard(title, msg) {
  const id = 'wa-' + Math.random().toString(36).substr(2,6);
  const safe = msg.replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return '<div style="background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:14px;margin-bottom:12px">' +
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">' +
      '<span style="font-weight:700;font-size:13px">'+title+'</span>' +

function _v(id) { return parseFloat(document.getElementById(id)?.value)||0; }

function _recalcKpi() {
  // ── EXACT formulas — uses editable rates from window._kpiRates ──
  const R = window._kpiRates || {};

  // Samir: tiered + pickups×rate
  function _samirCost(stops, pickups) {
    if (stops <= 0) return 0;
    const t4=R.samirT4||75, t5=R.samirT5||85, t6=R.samirT6||95, t7=R.samirT7||110, t8=R.samirT8||120, ex=R.samirExtra||15;
    let base = stops<=4?t4:stops===5?t5:stops===6?t6:stops===7?t7:stops===8?t8:t8+(stops-8)*ex;
    return base + pickups * (R.samirPickup||10);
  }

  // Ali, Ali2, Ali3, Ali4, Jozef
  function _stdRate(stops) {
    if (stops <= 0) return 0;
    const t4=R.aliT4||110, t5=R.aliT5||115, t6=R.aliT6||125, ex=R.aliExtra||15;
    if (stops <= 4) return t4;
    if (stops === 5) return t5;
    if (stops === 6) return t6;
    return t6 + (stops - 6) * ex;
  }

  // Packator
  function _packatorRate(stops) {
    const minStops = R.packatorMinStops||3, base=R.packatorBase||101, perStop=R.packatorPerStop||14;
    if (stops <= minStops-1) return 0;
    if (stops <= 4) return base;
    return base + (stops - 4) * perStop;
  }

  // Per-packator costs
  const p1cost = _packatorRate(_v('kpi-p1stops'));
  const p2cost = _packatorRate(_v('kpi-p2stops'));
  const p3cost = _packatorRate(_v('kpi-p3stops'));
  const p4cost = _packatorRate(_v('kpi-p4stops'));
  const p5cost = _packatorRate(_v('kpi-p5stops')); // Stadtbote 1
  const p6cost = _packatorRate(_v('kpi-p6stops')); // Stadtbote 2
  const packatorServiceCost = p1cost + p2cost + p3cost + p4cost + p5cost + p6cost;
  const packatorCost = packatorServiceCost + _v('kpi-packatorDispatch');
  const packatorStops = _v('kpi-p1stops')+_v('kpi-p2stops')+_v('kpi-p3stops')+_v('kpi-p4stops')+_v('kpi-p5stops')+_v('kpi-p6stops');

  // Samir
  const sStops = _v('kpi-samirStops');
  const samirPickups = _v('kpi-samirPickup');
  const samirCost = _samirCost(sStops, samirPickups);
  const samirPickupCost = 0; // already included in samirCost via _samirCost

  // Ali & Jozef
  const aliCost  = _stdRate(_v('kpi-aliStops')) + _stdRate(_v('kpi-ali2stops')) + _stdRate(_v('kpi-ali3stops')) + _stdRate(_v('kpi-ali4stops'));
  const jozefCost = _stdRate(_v('kpi-jozefStops'));

  // Mykhailo: direct cost entry
  const mykhailoCost = _v('kpi-mykhailoRate');

  // Internal costs
  const internalCost = _v('kpi-driverCost')+_v('kpi-dispatcherCost')+_v('kpi-logMgrCost')+_v('kpi-fuelCost');

  // Extra
  const extraCost = _v('kpi-extraAmt');

  const totalLogCost = packatorCost + samirCost + samirPickupCost + aliCost + jozefCost + mykhailoCost + internalCost + extraCost;
  const totalStops = packatorStops + sStops + _v('kpi-samirPickup') + _v('kpi-mykhailoStops') +
    _v('kpi-aliStops')+_v('kpi-ali2stops')+_v('kpi-ali3stops')+_v('kpi-ali4stops')+_v('kpi-jozefStops');
  const totalRevenue = _v('kpi-totalRevenue') + _v('kpi-serviceFee');
  const netProfit = totalRevenue - totalLogCost;
  const logPct = totalRevenue > 0 ? (totalLogCost/totalRevenue*100).toFixed(1) : 0;
  const meals = _v('kpi-meals');
  const mealsPerStop = totalStops > 0 ? (meals/totalStops).toFixed(1) : 0;
  const cpStop = totalStops > 0 ? (totalLogCost/totalStops).toFixed(2) : 0;

  const set = (id,val) => { const el=document.getElementById(id); if(el) el.textContent=val; };
  set('kpi-out-logcost','€'+totalLogCost.toFixed(0));
  set('kpi-out-profit', (netProfit>=0?'€':'−€')+Math.abs(netProfit).toFixed(0));
  set('kpi-out-cpstop','€'+cpStop);
  // Also update Packator rate display
  const p1el=document.getElementById('kpi-p1-rate');if(p1el)p1el.textContent='€'+p1cost.toFixed(0);
  const p2el=document.getElementById('kpi-p2-rate');if(p2el)p2el.textContent='€'+p2cost.toFixed(0);
  const p3el=document.getElementById('kpi-p3-rate');if(p3el)p3el.textContent='€'+p3cost.toFixed(0);
  const p4el=document.getElementById('kpi-p4-rate');if(p4el)p4el.textContent='€'+p4cost.toFixed(0);
  const p5el=document.getElementById('kpi-p5-rate');if(p5el)p5el.textContent='€'+p5cost.toFixed(0);
  const p6el=document.getElementById('kpi-p6-rate');if(p6el)p6el.textContent='€'+p6cost.toFixed(0);
  const scEl=document.getElementById('kpi-samir-rate');if(scEl)scEl.textContent='€'+samirCost.toFixed(0);
  const a1El=document.getElementById('kpi-ali-rate');if(a1El)a1El.textContent='€'+_stdRate(_v('kpi-aliStops')).toFixed(0);
  const a2El=document.getElementById('kpi-ali2-rate');if(a2El)a2El.textContent='€'+_stdRate(_v('kpi-ali2stops')).toFixed(0);
  const a3El=document.getElementById('kpi-ali3-rate');if(a3El)a3El.textContent='€'+_stdRate(_v('kpi-ali3stops')).toFixed(0);
  const a4El=document.getElementById('kpi-ali4-rate');if(a4El)a4El.textContent='€'+_stdRate(_v('kpi-ali4stops')).toFixed(0);
  const jEl=document.getElementById('kpi-jozef-rate');if(jEl)jEl.textContent='€'+jozefCost.toFixed(0);
  set('kpi-out-mstop',''+mealsPerStop);
  set('kpi-out-pct',''+logPct+'%');
  set('kpi-out-stops',''+Math.round(totalStops));

  // Color profit card
  const profitEl = document.getElementById('kpi-out-profit');
  if (profitEl) profitEl.style.color = netProfit >= 0 ? '#10b981' : '#ef4444';

  // Payment summary table
  const payTable = document.getElementById('kpi-payment-table');
  if (payTable) {
    payTable.innerHTML =
      '<table style="width:100%;border-collapse:collapse;font-size:13px">' +
      '<thead><tr style="background:#f9fafb"><th style="padding:8px 12px;text-align:left;border-bottom:2px solid #e5e7eb">Entity</th>' +
      '<th style="padding:8px 12px;text-align:right;border-bottom:2px solid #e5e7eb">Daily (Calc)</th></tr></thead><tbody>' +
      [
        ['Ali (Total Payable)', aliCost],
        ['Jozef (Payable)', jozefCost],
        ['Packator Fleet (Service)', packatorServiceCost],
        ['Packator Dispatch (Manual)', _v('kpi-packatorDispatch')],
        ['Samir (incl. '+(samirPickups>0?samirPickups+' pickup':'no pickup')+')', samirCost],
        ['Mykhailo (Payable)', mykhailoCost],
        ['Internal Fleet', internalCost],
        ['Extra Costs', extraCost],
      ].map(([name,val]) =>
        '<tr style="border-bottom:1px solid #f3f4f6"><td style="padding:8px 12px;font-weight:500">'+name+'</td>' +
        '<td style="padding:8px 12px;text-align:right;color:'+(val>0?'#dc2626':'#6b7280')+'">€'+val.toFixed(2)+'</td></tr>'
      ).join('') +
      '<tr style="background:#fef9c3;font-weight:700"><td style="padding:8px 12px">TOTAL LOGISTIC COST</td>' +
      '<td style="padding:8px 12px;text-align:right;color:#dc2626">€'+totalLogCost.toFixed(2)+'</td></tr>' +
      '<tr style="background:#f0fdf4;font-weight:700"><td style="padding:8px 12px">NET PROFIT</td>' +
      '<td style="padding:8px 12px;text-align:right;color:'+(netProfit>=0?'#16a34a':'#dc2626')+'">€'+netProfit.toFixed(2)+'</td></tr>' +
      '</tbody></table>';
  }

  // Store current calculated values for saving
  window._kpiCalc = { totalLogCost, netProfit, logPct, totalStops, cpStop, mealsPerStop,
    packatorCost, samirCost, aliCost, jozefCost, mykhailoCost, internalCost, extraCost };
}

async function loadKpiDay(date) {
  if (!date || !window._fbReady || !window._fbDb) return;
  try {
    const snap = await window._fbGetDoc(window._fbDoc(window._fbDb,'logisticKPI','Berlin_'+date));
    if (!snap.exists()) { _recalcKpi(); return; }
    const d = snap.data();
    const setVal = (id, key) => { const el=document.getElementById(id); if(el&&d[key]!==undefined) el.value=d[key]; };
    setVal('kpi-totalRevenue','totalRevenue');setVal('kpi-serviceFee','serviceFee');
    setVal('kpi-catering','catering');setVal('kpi-meals','meals');setVal('kpi-addOns','addOns');
    setVal('kpi-gygCatering','gygCatering');setVal('kpi-revolute','revolute');
    setVal('kpi-paypal','paypal');setVal('kpi-ufaSales','ufaSales');
    setVal('kpi-p1stops','p1stops');setVal('kpi-p2stops','p2stops');setVal('kpi-p3stops','p3stops');
    setVal('kpi-p4stops','p4stops');setVal('kpi-p5stops','p5stops');setVal('kpi-p6stops','p6stops');
    setVal('kpi-packatorDispatch','packatorDispatch');setVal('kpi-samirStops','samirStops');
    setVal('kpi-samirPickup','samirPickup');setVal('kpi-mykhailoStops','mykhailoStops');setVal('kpi-mykhailoRate','mykhailoRate');
    setVal('kpi-jozefStops','jozefStops');setVal('kpi-aliStops','aliStops');setVal('kpi-ali2stops','ali2stops');
    setVal('kpi-ali3stops','ali3stops');setVal('kpi-ali4stops','ali4stops');
    setVal('kpi-driverCost','driverCost');setVal('kpi-dispatcherCost','dispatcherCost');
    setVal('kpi-logMgrCost','logMgrCost');setVal('kpi-fuelCost','fuelCost');
    setVal('kpi-internalDel','internalDel');setVal('kpi-internalPickup','internalPickup');
    setVal('kpi-totalDelManual','totalDelManual');setVal('kpi-dishesScanned','dishesScanned');
    setVal('kpi-deliveriesLate','deliveriesLate');setVal('kpi-minutesLate','minutesLate');
    setVal('kpi-extraAmt','extraAmt');
    if(d.extraPerson){const el=document.getElementById('kpi-extraPerson');if(el)el.value=d.extraPerson;}

    _recalcKpi();
    await loadKpiCharts();
  } catch(e) { console.warn('KPI load error:', e); }
}

async function loadKpiCharts() {
  if (typeof Chart === 'undefined') return;
  try {
    const { getDocs } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const snap = await getDocs(window._fbCollection(window._fbDb,'logisticKPI'));
    const records = [];
    snap.forEach(d => { const data=d.data(); if(data.city==='Berlin') records.push(data); });
    records.sort((a,b)=>a.date.localeCompare(b.date));
    const last30 = records.slice(-30);
    const labels = last30.map(r=>r.date.slice(5)); // MM-DD

    // Revenue vs Cost chart
    const revCtx = document.getElementById('kpi-chart-rev');
    if (revCtx) {
      if (window._kpiChartRev) window._kpiChartRev.destroy();
      window._kpiChartRev = new Chart(revCtx, {
        type:'line',
        data:{ labels,
          datasets:[
            {label:'Net Revenue',data:last30.map(r=>(r.totalRevenue||0)+(r.serviceFee||0)),borderColor:'#10b981',backgroundColor:'rgba(16,185,129,0.1)',tension:0.3,fill:true},
            {label:'Logistic Cost',data:last30.map(r=>r.totalLogCost||0),borderColor:'#ef4444',backgroundColor:'rgba(239,68,68,0.1)',tension:0.3,fill:true},
          ]},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:11}}}},scales:{x:{ticks:{font:{size:10}}},y:{ticks:{font:{size:10}}}}}
      });
    }

    // Cost breakdown chart
    const costCtx = document.getElementById('kpi-chart-cost');
    if (costCtx) {
      if (window._kpiChartCost) window._kpiChartCost.destroy();
      window._kpiChartCost = new Chart(costCtx, {
        type:'bar',
        data:{ labels,
          datasets:[
            {label:'Packator',data:last30.map(r=>r.packatorCost||0),backgroundColor:'#6366f1',stack:'cost'},
            {label:'Samir',data:last30.map(r=>r.samirCost||0),backgroundColor:'#f59e0b',stack:'cost'},
            {label:'Ali/Jozef',data:last30.map(r=>r.aliCost||0),backgroundColor:'#3b82f6',stack:'cost'},
            {label:'Internal',data:last30.map(r=>r.internalCost||0),backgroundColor:'#10b981',stack:'cost'},
          ]},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:10}}}},scales:{x:{stacked:true,ticks:{font:{size:9}}},y:{stacked:true,ticks:{font:{size:10}}}}}
      });
    }
  } catch(e) { console.warn('Chart error:', e); }
}

let _courierTableData = [];

function _renderCourierTable(couriers) {
  _courierTableData = couriers;
  const el = document.getElementById('an-couriers');
  if(!el) return;
  el.innerHTML =
  '<div class="table-wrap"><table>' +
  '<thead><tr><th>Courier</th><th>Kitchen</th><th>Total</th><th>Failed</th><th>On-Time %</th></tr></thead><tbody>' +
  (couriers.length===0?'<tr><td colspan="5" style="text-align:center;color:#9ca3af;padding:16px">No data</td></tr>':
  couriers.map(c=>{
    const name = c.courierName||c.name||'—';
    const total = c.total||0;
    const failed = c.failed||0;
    const rate = c.onTimeRate!=null?c.onTimeRate:(c.onTime||0);
    const avgDelay = c.avgDelayMin!=null ? ' (avg +'+c.avgDelayMin+'min)' : '';
    return '<tr>' +
    '<td><b>'+name+'</b></td>' +
    '<td style="color:#6b7280;font-size:12px">'+(c.activeDays||'—')+' days active</td>' +
    '<td>'+total+'</td>' +
    '<td><span style="color:'+(failed>5?'#dc2626':'#374151')+'">'+failed+'</span></td>' +
    '<td><span style="color:'+(rate>=90?'#16a34a':rate>=75?'#d97706':'#dc2626')+'">'+rate+'%'+avgDelay+'</span></td>' +
    '</tr>';
  }).join('')) +
  '</tbody></table></div>';
}

function exportCourierCSV() {
  const rows = [['Courier','Kitchen','Total Deliveries','Failed','On-Time %']];
  _courierTableData.forEach(c=>rows.push([c.name,c.kitchen,c.total,c.failed,c.onTime+'%']));
  const csv = rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download = 'bellabona-courier-performance-'+new Date().toISOString().split('T')[0]+'.csv';
  a.click();
}

function _renderKitchenCompare(d) {
  const el = document.getElementById('an-kitchen-compare');
  if(!el) return;
  // API returns {kitchens:{munich:{...},berlin:{...}}} OR flat object
  const src = d.kitchens || d;
  const kitchens = Object.keys(src);
  const colors = {Munich:'#3b82f6',Berlin:'#10b981',munich:'#3b82f6',berlin:'#10b981'};
  if(kitchens.length===0){el.innerHTML='<div style="color:#9ca3af;font-size:13px;padding:16px">No comparison data</div>';return;}
  el.innerHTML = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">' +
  kitchens.map(k=>{
    const v = src[k];
    const label = k.charAt(0).toUpperCase()+k.slice(1);
    const color = colors[k]||'#6366f1';
    const rate = v.onTimeRate!=null?v.onTimeRate:(v.onTime||0);
    const couriers = v.courierCount!=null?v.courierCount:(v.couriers||0);
    return '<div style="border:1px solid #e5e7eb;border-radius:8px;padding:14px;border-top:3px solid '+color+'">' +
      '<div style="font-size:14px;font-weight:600;color:#111827;margin-bottom:10px">'+label+'</div>' +
      '<div style="font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:0.04em">Total</div><div style="font-size:22px;font-weight:700;color:#111827;margin-bottom:6px">'+(v.total||0)+'</div>' +
      '<div style="font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:0.04em">Couriers</div><div style="font-size:16px;font-weight:600;color:#374151;margin-bottom:6px">'+couriers+'</div>' +
      '<div style="font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:0.04em">On-Time</div><div style="font-size:16px;font-weight:600;color:'+(rate>=90?'#16a34a':'#d97706')+'">'+rate+'%</div>' +
    '</div>';
  }).join('') +
  '</div>';
}
