function badge(status) {
  const map = {
    'delivered':'badge-green','Executed':'badge-green','success':'badge-green','active':'badge-green',
    'pending':'badge-amber','Executing':'badge-amber','executing':'badge-amber',
    'failed':'badge-red','error':'badge-red','inactive':'badge-gray',
    'Calculated':'badge-blue','calculated':'badge-blue','info':'badge-blue',
    'Skipped':'badge-gray','skipped':'badge-gray',
    'warning':'badge-amber',
  };
  const cls = map[status] || 'badge-gray';
  return '<span class="badge ' + cls + '">' + status + '</span>';
}

function openPanel(title, html) {
  document.getElementById('slide-panel-title').textContent = title;
  document.getElementById('slide-panel-body').innerHTML = html;
  document.getElementById('slide-panel').classList.add('open');
  document.getElementById('panel-overlay').style.display = 'block';
}

function closePanel() {
  document.getElementById('slide-panel').classList.remove('open');
  document.getElementById('panel-overlay').style.display = 'none';
}

function openModal(html) {
  document.getElementById('modal-content').innerHTML = html;
  document.getElementById('modal-overlay').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
}

document.getElementById('modal-overlay').addEventListener('click', function(e){
  if(e.target===this) closeModal();
});

function pColor(pct) {
  return pct>=70?'':pct>=40?'amber':'red';
}

function addMins(time, mins) {
  const [h,m] = time.split(':').map(Number);
  const t = h*60+m+mins;
  return String(Math.floor(t/60)).padStart(2,'0')+':'+String(t%60).padStart(2,'0');
}

function genStops(r) {
  const cos = ['Check24','Stylight','Westwing','Celonis','Allianz','Siemens','MAN','Telefonica','BMW','Bosch'];
  const sts = ['Landsberger Str.','Nymphenburger Str.','Schleisskstr.','Dachauer Str.','Leopoldstr.','Maximilianstr.'];
  return Array.from({length:r.stops},(_,j)=>({
    company:cos[j%cos.length]+' '+(j+1),
    address:sts[j%sts.length]+' '+(10+j*12),
    eta:addMins(r.start,j*8),
    status:j<r.stops-r.late?'delivered':(j===r.stops-1?'failed':'pending'),
    boxes:Math.max(1,Math.ceil(r.boxes/r.stops)),
  }));
}

function mkRouteCard(r,i) {
  const pct = Math.round((r.stops-r.late)/r.stops*100);

let _liveDriverMarkers = {};
let _liveSocket = null;

function initDashMap(routes) {
  const c = document.getElementById('leaflet-map');
  if(!c||typeof L==='undefined') return;
  if(leafletMap){leafletMap.remove();leafletMap=null;}
  if(_liveSocket){try{_liveSocket.disconnect();}catch(e){}_liveSocket=null;}
  _liveDriverMarkers = {};
  const center = dashboardTab==='Berlin'?[52.52,13.405]:[48.137,11.576];
  leafletMap = L.map('leaflet-map').setView(center,12);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; OpenStreetMap',maxZoom:18}).addTo(leafletMap);
  const mBase = [[48.134,11.505],[48.155,11.540],[48.126,11.572],[48.140,11.587],[48.112,11.533],[48.107,11.545],[48.103,11.514],[48.109,11.590],[48.116,11.576],[48.138,11.520],[48.145,11.565],[48.125,11.548],[48.160,11.590],[48.120,11.525]];
  const bBase = [[52.52,13.38],[52.50,13.42],[52.53,13.40],[52.51,13.35],[52.48,13.43],[52.54,13.38],[52.49,13.46]];
  const bases = dashboardTab==='Berlin'?bBase:dashboardTab==='Munich'?mBase:[...mBase,...bBase];
  routes.forEach((r,i)=>{
    if(i>=bases.length) return;
    const pos = bases[i];
    const icon = L.divIcon({className:'',html:'<div style="background:'+r.color+';color:#fff;border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.3)">'+r.name.substring(0,2).toUpperCase()+'</div>',iconSize:[28,28],iconAnchor:[14,14]});
    L.marker(pos,{icon}).addTo(leafletMap).bindPopup('<b>'+r.name+'</b><br>'+r.stops+' stops &bull; '+r.boxes+' boxes<br>'+r.start+'&rarr;'+r.end);
    const rng = ()=>(Math.random()-0.5)*0.05;
    Array.from({length:Math.min(r.stops,5)},()=>[pos[0]+rng(),pos[1]+rng()]).forEach(sp=>{
      L.circleMarker(sp,{radius:5,fillColor:r.color,color:'#fff',weight:1,fillOpacity:0.8}).addTo(leafletMap);
    });
  });

  // Live GPS: fetch initial positions (skip when no local server)
  try {
    if(API_BASE) fetch(`${API_BASE}/api/tracking/live`).then(r=>r.json()).then(positions=>{
      const drivers = Array.isArray(positions) ? positions : (positions.drivers||[]);
      drivers.forEach(drv=>{
        const lat = drv.latitude||drv.lat;
        const lng = drv.longitude||drv.lng;
        if(!lat||!lng) return;
        const name = drv.driverName||drv.name||'?';
        const id = drv.driverId||drv.id||name;
        const initials = name.substring(0,2).toUpperCase();
        const icon = L.divIcon({className:'',html:'<div style="background:#f97316;color:#fff;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.4)">'+initials+'</div>',iconSize:[30,30],iconAnchor:[15,15]});
        const marker = L.marker([lat,lng],{icon}).addTo(leafletMap)
          .bindPopup('<b>'+name+'</b><br>Last seen: '+(drv.recordedAt||'now'));
        _liveDriverMarkers[id] = marker;
      });
    }).catch(()=>{});
  } catch(e){}

  // Live GPS: Use Firebase RTDB when no local server; socket.io otherwise
  try {
    if (!API_BASE) {
      // Firebase Realtime Database for live GPS
      try {
        const fbGpsUrl = 'https://routing-22aad-default-rtdb.europe-west1.firebasedatabase.app/gps.json';
        fetch(fbGpsUrl).then(r=>r.json()).then(snap=>{
          if(!snap) return;
          Object.entries(snap).forEach(([id,drv])=>{
            const lat=drv.lat||drv.latitude, lng=drv.lng||drv.longitude;
            if(!lat||!lng||!leafletMap) return;
            const name=drv.name||id, initials=name.substring(0,2).toUpperCase();
            const icon=L.divIcon({className:'',html:'<div style="background:#f97316;color:#fff;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.4)">'+initials+'</div>',iconSize:[30,30],iconAnchor:[15,15]});
            const marker=L.marker([lat,lng],{icon}).addTo(leafletMap).bindPopup('<b>'+name+'</b>');
            _liveDriverMarkers[id]=marker;
          });
        }).catch(()=>{});
      } catch(e2){}
    } else if(typeof io !== 'undefined') {
      _liveSocket = io(API_BASE,{transports:['websocket'],reconnection:true,reconnectionAttempts:3});
      _liveSocket.on('connect',()=>{
        const badge = document.getElementById('live-map-badge');
        if(badge) badge.style.display='inline-flex';
      });
      _liveSocket.on('disconnect',()=>{
        const badge = document.getElementById('live-map-badge');
        if(badge) badge.style.display='none';
      });
      _liveSocket.on('gps_update',function(data){
        // Backend emits: {driverId, driverName, latitude, longitude, accuracy, recordedAt}
        const lat = data.latitude||data.lat;
        const lng = data.longitude||data.lng;
        if(!leafletMap||!data||!lat||!lng) return;
        try {
          const id = data.driverId||data.id;
          const name = data.driverName||data.name||'?';
          const initials = name.substring(0,2).toUpperCase();
          const seenAt = data.recordedAt ? new Date(data.recordedAt).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}) : new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
          if(_liveDriverMarkers[id]) {
            _liveDriverMarkers[id].setLatLng([lat,lng]);
            _liveDriverMarkers[id].setPopupContent('<b>'+name+'</b><br>Last seen: '+seenAt);
          } else {
            const icon = L.divIcon({className:'',html:'<div style="background:#f97316;color:#fff;border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.4)">'+initials+'</div>',iconSize:[30,30],iconAnchor:[15,15]});
            const marker = L.marker([lat,lng],{icon}).addTo(leafletMap)
              .bindPopup('<b>'+name+'</b><br>Last seen: '+seenAt);
            _liveDriverMarkers[id] = marker;
          }
        } catch(e){}
      });
    }
  } catch(e){}
}

async function planLoadOrders() {
  const btn = (typeof event !== 'undefined' && event?.target?.tagName === 'BUTTON') ? event.target : null;
  if(btn) { btn.disabled=true; btn.textContent='Loading…'; }
  const bodyEl = document.getElementById('plan-body');
  // Cloud mode — load weekly template + match against any injected _planStops
  if (!API_BASE) {
    await loadFromWeeklyTemplate(bodyEl);
    if(btn) { btn.disabled=false; btn.textContent='↻ Reload from OMS'; }
    return;
  }
  if(bodyEl) bodyEl.innerHTML = '<div style="text-align:center;padding:40px;color:#9ca3af">⏳ Fetching live orders from OMS…</div>';
  try {
    const r = await fetch(`${API_BASE}/api/planning/orders?date=${_planDate}&kitchen=${_planKitchen}`);
    const d = await r.json();
    if (!r.ok) throw new Error(d.error || 'Failed');
    _planStops = d.stops || [];
    _planAssign = {};
    _planNotes  = {};

    // Try last-week assignments first (most accurate), fall back to zone auto-assign
    try {
      const lw = await fetch(`${API_BASE}/api/planning/last-week?date=${_planDate}&kitchen=${_planKitchen}`);
      const ld = await lw.json();
      const assignments = ld.assignments || {};
      let matched = 0;
      _planStops.forEach(s => {
        const key = s.company.toLowerCase().trim();
        const shortKey = shortName(s.company).toLowerCase().trim();
        const courier = assignments[key] || assignments[shortKey];
        if (courier) { _planAssign[s.branchId] = courier; matched++; }
      });
      // Any unmatched → zone auto-assign
      if (matched < _planStops.length) await planAutoAssign(true);
      const src = matched > 0 ? `last week (${matched} matched) + zone fallback` : 'zone auto-assign';
      if(bodyEl) bodyEl.innerHTML =
        '<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:8px 14px;font-size:13px;color:#16a34a;margin-bottom:8px">' +
        '✅ <b>'+_planStops.length+' stops · '+d.totalOrders+' orders</b> loaded from OMS for <b>'+_planKitchen+'</b> on <b>'+_planDate+'</b> &nbsp;·&nbsp; Assignments: '+src+'</div>';
    } catch {
      await planAutoAssign(true);
      if(bodyEl) bodyEl.innerHTML =
        '<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:8px 14px;font-size:13px;color:#16a34a;margin-bottom:8px">' +
        '✅ <b>'+_planStops.length+' stops · '+d.totalOrders+' orders</b> loaded from OMS · Assignments by zone</div>';
    }
    _paintPlanGrid();
  } catch(e) {
    if(bodyEl) bodyEl.innerHTML =
      '<div style="background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:14px;color:#dc2626">'+
      '❌ Could not reach the backend: <b>'+e.message+'</b><br><br>'+
      'Make sure the server is running: <code>node server.js</code></div>';
  }
  if(btn) { btn.disabled=false; btn.textContent='↻ Reload from OMS'; }
}

      const shortKey = shortName(s.company).toLowerCase().trim();
      const courier = assignments[key] || assignments[shortKey];
      if (courier) { _planAssign[s.branchId] = courier; matched++; }
    });
    _planDrivers = [...new Set(Object.values(_planAssign))].filter(Boolean).sort();
    alert('✅ Copied from '+d.lastWeekDate+': '+matched+'/'+_planStops.length+' stops matched.\n\nUnmatched stops are in the Unassigned column.');
    _paintPlanGrid();
  } catch(e) { alert('Failed: '+e.message); }
  btn.disabled=false; btn.textContent='📅 Use Last Week';
}

// ──────────────────────────────────────────────────────────────
// WEEKLY TEMPLATE — load from Firestore, match against today's orders
// ──────────────────────────────────────────────────────────────
async function loadFromWeeklyTemplate(bodyEl) {
  const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const dayName = DAY_NAMES[new Date(_planDate + 'T12:00:00').getDay()];

  if(bodyEl) bodyEl.innerHTML = '<div style="text-align:center;padding:40px;color:#9ca3af">⏳ Loading weekly template for '+dayName+'…</div>';

  if (!window._fbReady || !window._fbDb) {
    if(bodyEl) bodyEl.innerHTML = '<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:14px;color:#92400e;font-size:13px">⏳ Firebase loading, please try again in a moment.</div>';
    return;
  }

  try {
    const snap = await window._fbGetDoc(window._fbDoc(window._fbDb, 'weeklyTemplates', dayName));
    if (!snap.exists()) {
      if(bodyEl) bodyEl.innerHTML =
        '<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:14px;color:#92400e;font-size:13px">' +
        '📋 No weekly template for <b>'+dayName+'</b> yet. Paste JSON or drag-drop to build one, then click <b>💾 Save as Weekly Template</b>.</div>';
      return;
    }
    _weeklyTemplate = snap.data();

    // _planStops may already be populated (from Paste JSON or manual injection)
    // Build a map: normalised company name → stop data
    const orderMap = {};
    (_planStops||[]).forEach(s => {
      const key = s.company.toLowerCase().replace(/[^a-z0-9]/g,'');
      orderMap[key] = s;
    });

    function findOrder(templateName) {
      const tKey = templateName.toLowerCase().replace(/[^a-z0-9]/g,'');
      // exact
      if (orderMap[tKey]) return orderMap[tKey];
      // partial match
      for (const [k, s] of Object.entries(orderMap)) {
        if (k.includes(tKey.substring(0,6)) || tKey.includes(k.substring(0,6))) return s;
      }
      return null;
    }

    // Rebuild _planStops from template (ordered) + unmatched orders
    const usedBranchIds = new Set();
    const newStops = [];
    _planAssign = {};
    _planNotes  = {};

    for (const [driver, companies] of Object.entries(_weeklyTemplate.routes || {})) {
      for (const tmplName of companies) {
        const ordered = findOrder(tmplName);
        const id = ordered ? ordered.branchId : ('tmpl_' + tmplName.replace(/[^a-zA-Z0-9]/g,'_'));
        if (ordered) usedBranchIds.add(ordered.branchId);
        newStops.push({
          branchId:    id,
          company:     ordered ? ordered.company : tmplName,
          templateName: tmplName,
          address:     ordered ? ordered.address : '',
          postCode:    ordered ? ordered.postCode : '',
          deliveryInfo: ordered ? (ordered.deliveryInfo||'') : '',
          orderCount:  ordered ? (ordered.orderCount||1) : 0,
          hasOrder:    !!ordered,
        });
        _planAssign[id] = driver;
      }
    }

    // Add any orders NOT matched to template → Unassigned
    (_planStops||[]).forEach(s => {
      if (!usedBranchIds.has(s.branchId)) {
        newStops.push({...s, hasOrder:true});
        _planAssign[s.branchId] = 'Unassigned';
      }
    });

    _planStops = newStops;
    _planDrivers = _weeklyTemplate.drivers || [...new Set(Object.values(_planAssign))].filter(d=>d!=='Unassigned').sort();

    const ordered  = newStops.filter(s=>s.hasOrder).length;
    const missing  = newStops.filter(s=>!s.hasOrder).length;
    const unassigned = newStops.filter(s=>_planAssign[s.branchId]==='Unassigned').length;

    if(bodyEl) bodyEl.innerHTML =
      '<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:8px 14px;font-size:13px;color:#16a34a;margin-bottom:8px">' +
      '✅ <b>'+dayName+' template loaded</b> · '+ordered+' ordered · ' +
      '<span style="color:#dc2626;font-weight:700">'+missing+' not ordered today (red)</span>' +
      (unassigned > 0 ? ' · '+unassigned+' new stops (left)' : '') + '</div>';

    _paintPlanGrid();
  } catch(e) {
    if(bodyEl) bodyEl.innerHTML = '<div style="background:#fef2f2;border:1px solid #fecaca;border-radius:8px;padding:14px;color:#dc2626;font-size:13px">❌ '+e.message+'</div>';
  }
}

async function saveWeeklyTemplate() {
  if (!window._fbReady || !window._fbDb) { alert('Firebase not ready'); return; }
  if (_planStops.length === 0) { alert('Load orders first'); return; }
  const DAY_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const dayName = DAY_NAMES[new Date(_planDate + 'T12:00:00').getDay()];
  const btn = event.target; btn.disabled=true; btn.textContent='Saving…';
  try {
    // Build routes from current assignment
    const routes = {};
    _planDrivers.filter(d=>d!=='Unassigned').forEach(d => { routes[d] = []; });
    _planStops.forEach(s => {
      const driver = _planAssign[s.branchId];
      if (driver && driver !== 'Unassigned') {
        routes[driver] = routes[driver] || [];
        routes[driver].push(s.templateName || s.company);
      }
    });
    const tmpl = { drivers: _planDrivers.filter(d=>d!=='Unassigned'), routes,
      dispatchers: (_weeklyTemplate && _weeklyTemplate.dispatchers) || [],
      updatedAt: new Date().toISOString() };
    await window._fbSetDoc(window._fbDoc(window._fbDb,'weeklyTemplates',dayName), tmpl);
    _weeklyTemplate = tmpl;
    alert('✅ '+dayName+' template saved! Every future '+dayName+' will use this route.');
  } catch(e) { alert('Error: '+e.message); }
  btn.disabled=false; btn.textContent='💾 Save as Weekly Template';
}

function _paintPlanGrid() {
  if (_planStops.length === 0) return;

  _planStops.forEach(s => { if (!_planAssign[s.branchId]) _planAssign[s.branchId] = 'Unassigned'; });
  if (_weeklyTemplate && _weeklyTemplate.drivers) {
    _planDrivers = [..._weeklyTemplate.drivers];
    const extras = [...new Set(Object.values(_planAssign))].filter(d => d !== 'Unassigned' && !_planDrivers.includes(d));
    _planDrivers.push(...extras);
  } else {
    _planDrivers = [...new Set(Object.values(_planAssign))].filter(d => d !== 'Unassigned').sort();
  }
  const hasUnassigned = _planStops.some(s => _planAssign[s.branchId] === 'Unassigned');
  const allDrivers = hasUnassigned ? ['Unassigned', ..._planDrivers] : [..._planDrivers];

  const colStops = {};
  allDrivers.forEach(d => { colStops[d] = _planStops.filter(s => _planAssign[s.branchId] === d); });
  const maxRows = Math.max(...allDrivers.map(d => colStops[d].length), 1);

  const COL_COLORS = {
    Samir:'#fde68a', Ali1:'#bbf7d0', Ali2:'#bfdbfe', Ali:'#bbf7d0',
    Jozef:'#fecaca', Josef:'#fecaca', Martin:'#ddd6fe', Tasnim:'#fed7aa',
    Packator:'#e5e7eb', Packator1:'#e5e7eb', Packator2:'#d1fae5',
    Piyush:'#fce7f3', Mykhaielo:'#cffafe', Kartik:'#fef3c7',
    Yousef:'#ede9fe', Ali3:'#d1fae5', Unassigned:'#fef9c3'
  };
  const colColor = d => COL_COLORS[d] || (DRIVER_COLORS && DRIVER_COLORS[d]) || '#f3f4f6';
  const dispatchers = (_weeklyTemplate && _weeklyTemplate.dispatchers) || [];

  // Build table using DOM to avoid all string escaping issues
  const wrapper = document.createElement('div');
  wrapper.style.cssText = 'overflow-x:auto;padding-bottom:16px';

  const table = document.createElement('table');
  table.style.cssText = 'border-collapse:collapse;table-layout:fixed';

  // HEADER ROW
  const thead = table.createTHead();
  const hRow = thead.insertRow();
  allDrivers.forEach(driver => {
    const th = document.createElement('th');
    th.style.cssText = 'background:' + colColor(driver) + ';border:2px solid #111;padding:7px 10px;font-size:13px;font-weight:700;text-align:center;min-width:150px;width:160px;cursor:default;white-space:nowrap';
    th.dataset.driver = driver;
    th.setAttribute('ondragover', 'event.preventDefault()');
    th.setAttribute('ondrop', '_planDrop(this,event)');
    const cnt = colStops[driver].length;
    th.innerHTML = (driver === 'Unassigned' ? '&#9888; New Stops' : driver) +
      '<br><span style="font-size:10px;font-weight:400;color:#374151">' + cnt + ' stops</span>';
    hRow.appendChild(th);
  });
  // +Driver button column
  const thAdd = document.createElement('th');
  thAdd.style.cssText = 'background:#f9fafb;border:2px solid #111;width:50px;text-align:center;vertical-align:middle';
  const addBtn = document.createElement('button');
  addBtn.textContent = '+Driver';
  addBtn.style.cssText = 'background:#1a1a2e;color:#fff;border:none;border-radius:4px;padding:4px 6px;cursor:pointer;font-size:11px';
  addBtn.onclick = planAddDriver;
  thAdd.appendChild(addBtn);
  hRow.appendChild(thAdd);

  // BODY ROWS
  const tbody = table.createTBody();
  for (let i = 0; i < maxRows; i++) {
    const row = tbody.insertRow();
    allDrivers.forEach(driver => {
      const td = document.createElement('td');
      td.style.cssText = 'border:1px solid #d1d5db;padding:5px 7px;font-size:12px;min-width:150px;width:160px';
      td.dataset.driver = driver;
      td.setAttribute('ondragover', 'event.preventDefault()');
      td.setAttribute('ondrop', '_planDrop(this,event)');

      const s = colStops[driver][i];
      if (s) {
        td.draggable = true;
        td.dataset.id = s.branchId;
        td.setAttribute('ondragstart', 'planDragStart(event,this.dataset.id)');

        const noOrder = s.hasOrder === false;
        const isPickup = (s.templateName || s.company).toLowerCase().startsWith('pickup');
        const note = _planNotes[s.branchId] || '';

        if (noOrder)       { td.style.background = '#fee2e2'; td.style.color = '#b91c1c'; td.style.textDecoration = 'line-through'; td.style.opacity = '0.8'; }
        else if (isPickup) { td.style.background = '#f0fdf4'; td.style.color = '#166534'; }
        else if (note)     { td.style.background = '#faf5ff'; }
        else               { td.style.background = '#fff'; }

        const sn = shortName(s.company);
        const cnt = s.orderCount > 1 ? ' (' + s.orderCount + ')' : '';
        td.title = s.company + '\n' + s.address + ', ' + s.postCode + '\n' + (noOrder ? 'No order today' : s.orderCount + ' orders');

        const row2 = document.createElement('div');
        row2.style.cssText = 'display:flex;justify-content:space-between;align-items:center;gap:3px';

        const span = document.createElement('span');
        span.style.fontWeight = noOrder ? '400' : '600';
        span.textContent = (noOrder ? 'X ' : '') + sn + cnt;
        row2.appendChild(span);

        const editBtn = document.createElement('span');
        editBtn.textContent = '✎';
        editBtn.title = 'Add note';
        editBtn.style.cssText = 'cursor:pointer;color:#9ca3af;font-size:11px;flex-shrink:0';
        const bid = s.branchId, snCopy = sn;
        editBtn.onclick = (e) => { e.stopPropagation(); planEditNote(bid, snCopy); };
        row2.appendChild(editBtn);
        td.appendChild(row2);

        if (note) {
          const noteDiv = document.createElement('div');
          noteDiv.style.cssText = 'font-size:10px;color:#7c3aed;margin-top:2px;font-style:italic';
          noteDiv.textContent = note;
          td.appendChild(noteDiv);
        }
      } else {
        td.style.background = '#fafafa';
      }
      row.insertCell(-1).replaceWith(td);
    });
    // spacer cell
    const spacer = row.insertCell(-1);
    spacer.style.cssText = 'border:1px solid #e5e7eb;background:#f9fafb;width:50px';
  }

  // FOOTER ROW (dispatchers)
  const tfoot = document.createElement('tfoot');
  const fRow = tfoot.insertRow();
  allDrivers.forEach((driver, i) => {
    const td = document.createElement('td');
    td.style.cssText = 'background:#1a1a2e;color:#fff;border:2px solid #111;padding:6px 10px;font-weight:700;font-size:12px;text-align:center';
    td.textContent = dispatchers[_planDrivers.indexOf(driver)] || '—';
    fRow.appendChild(td);
  });
  const footSpacer = document.createElement('td');
  footSpacer.style.cssText = 'background:#1a1a2e;border:2px solid #111;width:50px';
  fRow.appendChild(footSpacer);
  table.appendChild(tfoot);

  wrapper.appendChild(table);

  const planBody = document.getElementById('plan-body');
  const existingMsg = planBody ? planBody.querySelector('#plan-msg') : null;
  const msgHtml = existingMsg ? existingMsg.outerHTML : '<div id="plan-msg"></div>';

  if (planBody) {
    planBody.innerHTML = msgHtml +
      '<div id="plan-table-wrap"></div>' +
      '<div style="margin-top:10px;font-size:12px;color:#6b7280">Drag stops between columns to reassign &middot; &#9998; add notes &middot; Red = no order today &middot; Top row = driver &middot; Bottom row = dispatcher</div>';
    document.getElementById('plan-table-wrap').appendChild(wrapper);
  }
}

function _planDrop(el, e) {
  e.preventDefault();
  const d = el.dataset.driver || el.closest('[data-driver]')?.dataset.driver;
  if (d) { if (!_planDragId) return; _planAssign[_planDragId]=d; _planDragId=null; _paintPlanGrid(); }
}
function planDragStart(e, branchId) {
  _planDragId = branchId;
  e.dataTransfer.effectAllowed = 'move';
}

function planDrop(e, driver) {
  e.preventDefault();
  if (!_planDragId) return;
  _planAssign[_planDragId] = driver;
  _planDragId = null;
  _paintPlanGrid();
}

function planEditNote(branchId, companyName) {
  const current = _planNotes[branchId] || '';
  const note = prompt('Note for '+companyName+':\n(e.g. "Red plates", "Pickup after 14:00", "9:15 AM start")', current);
  if (note !== null) {
    _planNotes[branchId] = note;
    _paintPlanGrid();
  }
}

function planAddDriver() {
  const name = prompt('Enter driver name:');
  if (name?.trim() && !_planDrivers.includes(name.trim())) {
    _planDrivers.push(name.trim());
    _paintPlanGrid();
  }
}

async function planSaveToApp() {
  if (_planStops.length === 0) { alert('Load orders first'); return; }
  const btn = event.target; btn.disabled=true; btn.textContent='Saving…';
  try {
    const assignments = _planStops.map(s => ({
      branchId: s.branchId, company: s.company, address: s.address,
      postCode: s.postCode, city: s.city, deliveryInfo: s.deliveryInfo,
      orderCount: s.orderCount, courier: _planAssign[s.branchId]||'Unassigned',
      notes: _planNotes[s.branchId]||null,
    })).filter(a => a.courier !== 'Unassigned');

    const r = await fetch(`${API_BASE}/api/planning/save`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ date:_planDate, kitchen:_planKitchen, assignments }),

    const d = await r.json();

    const el = document.getElementById('plan-msg');

  } catch(e) { alert('Error: '+e.message); }
  btn.disabled=false; btn.textContent='💾 Save → Driver App';
}

function planExportExcel() {
  if (_planStops.length === 0) { alert('Load orders first'); return; }
  if (typeof XLSX === 'undefined') { alert('SheetJS not loaded — make sure you\'re connected to the internet'); return; }

  const wb = XLSX.utils.book_new();
  const date = new Date(_planDate);
  const dayName = date.toLocaleDateString('de-DE',{weekday:'long'});

  // Build the column-per-driver layout matching DiversPotsdam.xlsx format
  const drivers = _planDrivers.filter(d=>d!=='Unassigned');
  const stopsByDriver = {};
  drivers.forEach(d => { stopsByDriver[d] = _planStops.filter(s=>_planAssign[s.branchId]===d); });

  const maxRows = Math.max(...drivers.map(d => stopsByDriver[d].length));

  // Rows: 0-3 empty, row 4 = driver headers, row 5+ = stops
  const data = [];
  for (let i=0;i<4;i++) data.push(new Array(drivers.length).fill(''));
  data.push(drivers); // Row 4 = headers
  for (let r=0;r<maxRows+2;r++) {
    const row = drivers.map((d,ci) => {
      const stops = stopsByDriver[d];
      const s = stops[r];
      if (!s) return '';
      const sn = shortName(s.company);
      const note = _planNotes[s.branchId];
      return note ? `${sn} — ${note}` : sn;
    });
    data.push(row);
  }

  // Red plates section
  data.push(new Array(drivers.length).fill(''));
  data.push(['DON\'T FORGET THE RED PLATES BITTE', ...new Array(drivers.length-1).fill('')]);
  data.push(['Red hot plates for mandatory use in these companies', ...new Array(drivers.length-1).fill('')]);

  const ws = XLSX.utils.aoa_to_sheet(data);

  // Column widths
  ws['!cols'] = drivers.map(()=>({wch:22}));

  // Style driver headers (row 4 = index 4, Excel row 5)
  drivers.forEach((d,ci) => {
    const cell = XLSX.utils.encode_cell({r:4, c:ci});
    if (!ws[cell]) ws[cell] = {v:d};
    ws[cell].s = {
      font: {bold:true, underline:true, sz:14},
      fill: {fgColor:{rgb: (DRIVER_COLORS[d]||'#f3f4f6').replace('#','')}, patternType:'solid'},
      alignment: {horizontal:'center'},
      border: {bottom:{style:'thin',color:{rgb:'000000'}}}
    };
  });

  // Style notes (pickup rows etc.)
  _planStops.forEach(s => {
    if (_planNotes[s.branchId]) {
      const d = _planAssign[s.branchId];
      const ci = drivers.indexOf(d);
      const stops = stopsByDriver[d];
      const ri = stops.findIndex(x=>x.branchId===s.branchId);
      if (ci>=0 && ri>=0) {
        const cell = XLSX.utils.encode_cell({r:5+ri, c:ci});
        if (ws[cell]) ws[cell].s = {font:{color:{rgb:'7C3AED'}, italic:true}};
      }
    }
  });

  XLSX.utils.book_append_sheet(wb, ws, dayName);

  // Add a second sheet: detailed stop list with addresses + contact info
  const detailData = [['Driver','Company','Short Name','Address','Postal','City','Orders','Contact Info','Notes']];
  drivers.forEach(d => {
    stopsByDriver[d].forEach(s => {
      detailData.push([d, s.company, shortName(s.company), s.address, s.postCode, s.city, s.orderCount,
        (s.deliveryInfo||'').split('\n')[0]||'', _planNotes[s.branchId]||'']);
    });
  });
  const ws2 = XLSX.utils.aoa_to_sheet(detailData);
  ws2['!cols'] = [12,30,20,25,8,12,8,30,20].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, ws2, 'Details');

  const fileName = `BellaBona_${_planKitchen}_${_planDate}.xlsx`;
  XLSX.writeFile(wb, fileName);
}

}

function parseOmsJson(raw) {
  const data = JSON.parse(raw);
  return data.map(branch => {
    const totalBoxes = branch.boxes ? branch.boxes.length : 0;
    const uniqueUsers = new Set();
    (branch.boxes||[]).forEach(box => {
      (box.dishes||[]).forEach(dish => {
        (dish.users||[]).forEach(u => { if(u.orderedQuantity>0) uniqueUsers.add(u.id); });
      });
    });
    const dishes = [];
    (branch.boxes||[]).forEach(box => {
      (box.dishes||[]).forEach(dish => {
        dishes.push({ name:dish.name, label:dish.label, type:box.type, size:box.size,
          count:(dish.users||[]).reduce((s,u)=>s+(u.orderedQuantity||0),0) });
      });
    });
    return {
      branchId:    branch.id,
      company:     branch.name,
      address:     branch.deliveryAddress || '',
      postCode:    branch.deliveryPostalCode || '',
      city:        branch.deliveryCity || '',
      deliveryInfo: branch.deliveryInstructions || '',
      orderCount:  totalBoxes,
      userCount:   uniqueUsers.size,
      readyTime:   branch.readyTime,
      leaveTime:   branch.leaveTime,
      boxes:       branch.boxes || [],
      dishes:      dishes,
    };
  });
}

function previewJsonImport() {
  const raw = document.getElementById('json-paste-area').value.trim();

    const el = document.getElementById('trial-progress');
    if(el) el.innerHTML = _trialProgress.map(r=>_driverProgressCard(r)).join('');

    // Init map once

      _updateTrialMapMarkers(_trialProgress);

let _trialMap = null;
let _trialMarkers = {};

function _initTrialMap(progress) {
  const c = document.getElementById('trial-map');
  if(!c||typeof L==='undefined') return;
  if(_trialMap){_trialMap.remove();_trialMap=null;}
  _trialMarkers = {};
  _trialMap = L.map('trial-map').setView([52.52,13.4],11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; OpenStreetMap',maxZoom:18}).addTo(_trialMap);

  // Depot marker
  L.marker([52.3906,13.0645],{
    icon:L.divIcon({className:'',html:'<div style="background:#1d4ed8;color:#fff;border-radius:6px;padding:3px 7px;font-size:10px;font-weight:700;white-space:nowrap">🏭 Berlin Depot</div>',iconAnchor:[40,10]})
  }).addTo(_trialMap).bindPopup('Berlin Depot — Friedrich-Engels-Str. 22, Potsdam');

  // GPS / stop markers
  _updateTrialMapMarkers(progress);

  // Socket.io live GPS
  try {
    if(typeof io!=='undefined') {
      const sock = io(API_BASE,{transports:['websocket'],reconnectionAttempts:3});
      sock.on('connect',()=>{const b=document.getElementById('trial-live-badge');if(b)b.style.display='inline-flex';});
      sock.on('gps_update',function(data){
        const lat=data.latitude||data.lat, lng=data.longitude||data.lng;
        const id=data.driverId||data.id, name=data.driverName||data.name||'?';
        if(!lat||!lng||!_trialMap) return;
        const initials=name.substring(0,2).toUpperCase();
        if(_trialMarkers['gps_'+id]) {
          _trialMarkers['gps_'+id].setLatLng([lat,lng]);
        } else {
          const icon=L.divIcon({className:'',html:'<div style="background:#f97316;color:#fff;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.4)">'+initials+'</div>',iconSize:[32,32],iconAnchor:[16,16]});
          _trialMarkers['gps_'+id]=L.marker([lat,lng],{icon}).addTo(_trialMap).bindPopup('<b>'+name+'</b><br>GPS live');
        }
      });
    }
  } catch(e){}
}

function _updateTrialMapMarkers(progress) {
  if(!_trialMap) return;
  const driverColors=['#e85d04','#3b82f6','#10b981','#8b5cf6','#f59e0b'];
  (progress||[]).forEach((r,i) => {
    const color = driverColors[i%driverColors.length];
    if(r.lastGps) {
      const lat=r.lastGps.latitude||r.lastGps.lat, lng=r.lastGps.longitude||r.lastGps.lng;
      if(lat&&lng) {
        const initials=(r.courierName||'?').substring(0,2).toUpperCase();
        if(_trialMarkers['drv_'+r.routeId]) {
          _trialMarkers['drv_'+r.routeId].setLatLng([lat,lng]);
        } else {
          const icon=L.divIcon({className:'',html:'<div style="background:'+color+';color:#fff;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.3)">'+initials+'</div>',iconSize:[32,32],iconAnchor:[16,16]});
          _trialMarkers['drv_'+r.routeId]=L.marker([lat,lng],{icon}).addTo(_trialMap).bindPopup('<b>'+r.courierName+'</b><br>'+r.delivered+'/'+r.totalStops+' stops done');
        }
      }
    }
    // Mark stops
    (r.stops||[]).forEach((s,j)=>{
      if(!s.postalCode) return;
      // We won't geocode here — just show placeholder if no GPS
    });
  });
}

async function renderOrders() {
  if(ordersLoading) return;
  const c = document.getElementById('content');
  c.innerHTML = '<div class="page"><div style="padding:60px;text-align:center;color:#9ca3af">Loading orders…</div></div>';
  ordersLoading = true;
  try {
    const qs = new URLSearchParams({date:ordersFilter.date});
    if(ordersFilter.kitchen!=='all') qs.set('kitchen',ordersFilter.kitchen);
    if(ordersFilter.courier!=='all') qs.set('courier',ordersFilter.courier);
    if(ordersFilter.search) qs.set('search',ordersFilter.search);
    if(ordersFilter.status!=='all') qs.set('status',ordersFilter.status);
    const r = await fetch(`${API_BASE}/api/orders/flat?${qs}`);
    const d = await r.json();
    ordersData = d.orders || [];
  } catch(e) {
    ordersData = [];
  }
  ordersLoading = false;
  _paintOrders();
}

        '<tr><td style="color:#6b7280;padding:4px 0">Courier</td><td>'+o.courierName+'</td></tr>'+
        (o.localNotes?'<tr><td style="color:#6b7280;padding:4px 0">Notes</td><td>'+o.localNotes+'</td></tr>':'')+
      '</table>' +

    (tl.length>0?

window._csvText = null;
window._csvRows = [];

function parseCsvPreview(text) {
  window._csvText = text;
  const lines = text.split('\n').map(l=>l.trim()).filter(Boolean);
  if(lines.length<2){alert('CSV must have at least one data row.');return;}
  const header = lines[0].split(',');
  const rows = lines.slice(1,Math.min(lines.length,11)).map(l=>l.split(','));
  window._csvRows = rows;
  document.getElementById('csv-count').textContent = (lines.length-1)+' rows to import (showing first '+rows.length+')';
  document.getElementById('csv-table-wrap').innerHTML =
    '<table><thead><tr>'+header.map(h=>'<th>'+h+'</th>').join('')+'</tr></thead><tbody>'+
    rows.map(r=>'<tr>'+r.map(c=>'<td style="font-size:12px">'+c+'</td>').join('')+'</tr>').join('')+
    '</tbody></table>';
  document.getElementById('csv-preview').style.display='block';
}

function handleCsvDrop(event) {
  event.preventDefault();
  document.getElementById('csv-drop').style.borderColor='#d1d5db';
  const file = event.dataTransfer.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => parseCsvPreview(e.target.result);
  reader.readAsText(file);
}

function handleCsvFile(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => parseCsvPreview(e.target.result);
  reader.readAsText(file);
}

async function submitCsvImport() {
  if(!window._csvText) return;
  const btn = document.querySelector('.modal .btn-primary');
  btn.textContent='Importing…';btn.disabled=true;
  try {
    const r = await fetch(`${API_BASE}/api/orders/import`,{
      method:'POST',
      headers:{'Content-Type':'text/plain'},
      body:window._csvText
    });
    const d = await r.json();
    document.getElementById('csv-result').style.display='block';
    document.getElementById('csv-result').innerHTML =
      d.ok
      ?'<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:12px;font-size:13px">'+
        '✅ Imported <b>'+d.imported+'</b> orders (batch: <code>'+d.batchId+'</code>)'+
        (d.errors.length?'<br><span style="color:#dc2626">'+d.errors.length+' errors: '+d.errors.slice(0,3).join(', ')+'</span>':'')+
        '</div>'
      :'<div style="color:#dc2626;font-size:13px">Error: '+(d.error||'Unknown')+'</div>';

  btn.textContent='Import Orders';btn.disabled=false;

async function saveServiceTime() {
  const prefix = document.getElementById('st-prefix').value.trim();
  const city   = document.getElementById('st-city').value.trim();
  const secs   = parseInt(document.getElementById('st-secs').value)||180;
  const desc   = document.getElementById('st-desc').value.trim();
  if(!prefix){alert('Postal prefix required');return;}
  await fetch(`${API_BASE}/api/orders/service-times/${encodeURIComponent(prefix)}`,{
    method:'PUT',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({service_time_s:secs,city,description:desc})
  });
  await loadServiceTimes();
}

async function deleteServiceTime(prefix) {
  if(!confirm('Delete zone '+prefix+'?')) return;
  await fetch(`${API_BASE}/api/orders/service-times/${encodeURIComponent(prefix)}`,{method:'DELETE'});
  await loadServiceTimes();
}

function renderShifts() {
  const today = new Date(2026,5,19);
  const sow = new Date(today);
  sow.setDate(today.getDate()-((today.getDay()+6)%7));
  let calHtml = '<div class="calendar-grid">';
  ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'].forEach(d=>{calHtml+='<div class="cal-header">'+d+'</div>';});
  for(let w=0;w<4;w++) for(let d=0;d<7;d++) {
    const dt = new Date(sow);
    dt.setDate(sow.getDate()+w*7+d);
    const isT = dt.toDateString()===today.toDateString();
    const av = 5+((w*7+d*3)%8);
    const dStr = dt.toISOString().split('T')[0];
    calHtml+='<div class="cal-cell'+(isT?' today':'')+'" onclick="openCalDay(\''+dStr+'\','+av+')" title="Click to manage '+dStr+'"><div class="cal-date">'+dt.getDate()+'.'+(dt.getMonth()+1)+'</div><div class="cal-count">'+av+'/14</div></div>';

async function triggerRoutePlan(scheduleName) {
  if(!confirm('Trigger route plan calculation for "'+scheduleName+'"?\n\nThis will call VROOM to optimize routes for tomorrow.')) return;
  const btn = event.target;
  btn.textContent='Calculating…';btn.disabled=true;
  try {
    const today = new Date();
    today.setDate(today.getDate()+1);
    const date = today.toISOString().split('T')[0];
    const r = await fetch(`${API_BASE}/api/route-plans`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({delivery_date:date,schedule_name:scheduleName})
    });
    const d = await r.json();
    if(d.ok || d.plan_code) {
      alert('✅ Route plan triggered!\nPlan ID: '+(d.plan_code||d.id||'—')+'\nDate: '+date+'\n\nGo to Route Plans to view the result.');
      window.location.hash='#route-plans';
    } else {
      alert('Route plan queued for '+date+'. Check Route Plans page.\n\n'+(d.error||''));
    }
  } catch(e) {
    alert('Could not reach the backend: '+e.message+'\n\nMake sure the server is running.');
  }
  btn.textContent='▶ Run route plan calculation';btn.disabled=false;
}

let zipDate = new Date().toISOString().split('T')[0];
let zipZones = [];

async function renderZipCodes() {
  document.getElementById('content').innerHTML =
  '<div class="page">' +
  '<div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between">' +

    '<div style="position:relative;border-radius:10px;overflow:hidden;border:1px solid #e5e7eb">' +
      '<div id="zip-map" style="height:100%;width:100%"></div>' +
      '<div style="position:absolute;top:12px;right:12px;background:rgba(255,255,255,0.95);border:1px solid #e5e7eb;border-radius:8px;padding:10px;z-index:1000;font-size:12px">' +
        '<div style="font-weight:600;margin-bottom:6px">Stop density</div>' +
        '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><div style="width:14px;height:14px;background:#fef9c3;border:1px solid #d97706;border-radius:2px"></div>1–3 stops</div>' +
        '<div style="display:flex;align-items:center;gap:6px;margin-bottom:4px"><div style="width:14px;height:14px;background:#fed7aa;border:1px solid #ea580c;border-radius:2px"></div>4–8 stops</div>' +
        '<div style="display:flex;align-items:center;gap:6px"><div style="width:14px;height:14px;background:#fca5a5;border:1px solid #dc2626;border-radius:2px"></div>9+ stops</div>' +
      '</div>' +
    '</div>' +
    '<div style="overflow-y:auto">' +
      '<div class="card-sm" style="margin-bottom:12px" id="zip-stats-card">Loading…</div>' +
      '<div class="table-wrap" id="zip-table-wrap"><table><thead><tr><th>Postal</th><th>City</th><th>Stops</th><th>Done</th><th>Svc Time</th></tr></thead><tbody id="zip-table-body"><tr><td colspan="5" style="text-align:center;color:#9ca3af">Loading…</td></tr></tbody></table></div>' +
    '</div>' +
  '</div></div>';

  // Load API data then init map
  try {
    const r = await fetch(`${API_BASE}/api/zip-codes/stats?date=${zipDate}&kitchen=${zipKitchen}`);
    const d = await r.json();
    zipZones = d.zones || [];

  } catch(e) {

  setTimeout(initZipMap, 100);

function _paintZipTable(zones, summary) {
  const card = document.getElementById('zip-stats-card');
  if(card && summary) card.innerHTML =
    '<div style="font-weight:600;margin-bottom:10px">'+zipKitchen+' · '+zipDate+'</div>'+
    '<div style="display:flex;gap:16px;flex-wrap:wrap">' +
      '<div><div style="font-size:11px;color:#9ca3af">TOTAL</div><div style="font-size:20px;font-weight:600">'+(summary.total||0)+'</div></div>' +
      '<div><div style="font-size:11px;color:#9ca3af">ZONES</div><div style="font-size:20px;font-weight:600">'+zones.length+'</div></div>' +
    '</div>';
  const tbody = document.getElementById('zip-table-body');
  if(tbody) tbody.innerHTML = zones.length===0
    ? '<tr><td colspan="5" style="text-align:center;color:#9ca3af;padding:20px">No data for this date/kitchen</td></tr>'
    : zones.map(z=>'<tr>' +
        '<td><code style="font-size:12px">'+z.postalCode+'</code></td>' +
        '<td style="font-size:12px;color:#6b7280">'+z.city+'</td>' +
        '<td style="font-weight:600">'+z.total+'</td>' +
        '<td><span style="color:'+(z.delivered===z.total?'#16a34a':'#d97706')+'">'+z.delivered+'/'+z.total+'</span></td>' +
        '<td style="font-size:12px">'+Math.round(z.serviceTimeS/60)+'min</td>' +
      '</tr>').join('');
}

function initZipMap() {
  const c = document.getElementById('zip-map');
  if(!c||typeof L==='undefined') return;
  if(zipMap){zipMap.remove();zipMap=null;}
  const center = zipKitchen==='Munich' ? [48.15,11.58] : [52.51,13.39];
  const zoom   = zipKitchen==='Munich' ? 11 : 11;
  zipMap = L.map('zip-map').setView(center, zoom);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; OpenStreetMap',maxZoom:18}).addTo(zipMap);

  // Plot API zones as circles (size = stop count)
  if(zipZones.length > 0) {
    zipZones.forEach(z => {
      if(!z.lat || !z.lng) return;
      const r = Math.max(400, Math.min(1400, z.total * 120));
      const fill = z.total >= 9 ? '#fca5a5' : z.total >= 4 ? '#fed7aa' : '#fef9c3';
      const stroke = z.total >= 9 ? '#dc2626' : z.total >= 4 ? '#ea580c' : '#d97706';
      L.circle([z.lat,z.lng],{radius:r,fillColor:fill,color:stroke,weight:1.5,fillOpacity:0.65})
        .addTo(zipMap)
        .bindPopup('<b>'+z.postalCode+'</b> '+z.city+'<br>'+z.total+' stops · '+z.delivered+' delivered<br>Service time: '+Math.round(z.serviceTimeS/60)+'min');
      L.marker([z.lat,z.lng],{icon:L.divIcon({className:'',html:'<div style="background:#1d4ed8;color:#fff;font-size:10px;font-weight:700;padding:1px 5px;border-radius:4px;white-space:nowrap;opacity:0.9">'+z.postalCode+' ('+z.total+')</div>',iconAnchor:[28,10]})}).addTo(zipMap);
    });
  } else {
    // Fall back to MUNICH_ZIPS static data
    const isM = zipKitchen==='Munich';
    if(isM) {
      MUNICH_ZIPS.forEach(z=>{
        L.circle([z.lat,z.lng],{radius:800,fillColor:'#fed7aa',color:'#ea580c',weight:1,fillOpacity:0.3}).addTo(zipMap).bindPopup('<b>'+z.zip+'</b><br>'+z.label);
        L.marker([z.lat,z.lng],{icon:L.divIcon({className:'',html:'<div style="background:#1d4ed8;color:#fff;font-size:10px;font-weight:600;padding:2px 5px;border-radius:4px;white-space:nowrap">'+z.zip+'</div>',iconAnchor:[20,10]})}).addTo(zipMap);
      });
    } else {
      [{zip:'10115',lat:52.530,lng:13.387},{zip:'10178',lat:52.520,lng:13.408},{zip:'10967',lat:52.495,lng:13.420},{zip:'14467',lat:52.396,lng:13.058}]
        .forEach(z=>{L.circle([z.lat,z.lng],{radius:800,fillColor:'#bbf7d0',color:'#059669',weight:1,fillOpacity:0.3}).addTo(zipMap).bindPopup('<b>'+z.zip+'</b>');});
    }
  }
}

async function saveDayClosure() {
  const k=document.getElementById('cl-k').value;
  const d=document.getElementById('cl-d').value;

  document.querySelector('.modal-overlay').remove();
  renderClosures();
}

}

// ALERTS
// ============================================================
let alertsData = [];

async function renderAlerts() {
  document.getElementById('content').innerHTML =
  '<div class="page"><div style="padding:60px;text-align:center;color:#9ca3af">Checking for alerts…</div></div>';
  try {
    const r = await fetch(`${API_BASE}/api/alerts`);
    const d = await r.json();
    alertsData = d.alerts||[];
    _paintAlerts(d);
  } catch(e) {
    // Fall back to static demo alerts if API offline
    alertsData = alerts.filter(a=>!a.dismissed).map(a=>({hash:String(a.id),type:a.severity,severity:a.severity,title:a.title,detail:a.meta}));
    _paintAlerts({visible:alertsData.length,dismissed:[]});
  }
}

function _paintAlerts(d) {
  const sev = {error:'🔴',warning:'🟡',info:'🔵',gps:'📡',late:'⏰',failed:'❌',closure:'🚫',region_closure:'⚠️'};
  const sevColor = {error:'#fee2e2',warning:'#fef3c7',info:'#dbeafe'};
  document.getElementById('content').innerHTML =
  '<div class="page">' +
  '<div class="page-header" style="display:flex;align-items:flex-start;justify-content:space-between">' +
    '<div><h2>Alerts</h2><p>'+alertsData.length+' active alert'+(alertsData.length!==1?'s':'')+'</p></div>' +
    '<div style="display:flex;gap:8px">' +
      '<button class="btn btn-sm" onclick="renderAlerts()">↻ Refresh</button>' +
      ((d.dismissed&&d.dismissed.length>0)?'<button class="btn btn-sm" onclick="restoreAlerts()">Restore dismissed ('+d.dismissed.length+')</button>':'') +
    '</div>' +
  '</div>' +
  (alertsData.length===0?'<div class="card" style="text-align:center;padding:48px;color:#9ca3af"><div style="font-size:32px;margin-bottom:8px">✅</div>No active alerts — all good!</div>':'') +
  alertsData.map(a=>{
    const icon = sev[a.type]||sev[a.severity]||'🔔';
    const bg   = sevColor[a.severity]||'#f3f4f6';
    return '<div class="alert-item '+a.severity+'" style="background:'+bg+';border-color:'+(a.severity==='error'?'#fecaca':a.severity==='warning'?'#fde68a':'#bfdbfe')+'">' +
      '<span style="font-size:22px;flex-shrink:0">'+icon+'</span>' +
      '<div class="alert-content">' +
        '<div class="alert-title">'+a.title+'</div>' +
        '<div class="alert-meta">'+(a.detail||a.kitchen||'')+'</div>' +
      '</div>' +
      '<button class="btn btn-sm" onclick="dismissAlert(\''+a.hash+'\')">Dismiss</button>' +
    '</div>';
  }).join('') +
  '</div>';
}

async function dismissAlert(hash) {
  await fetch(`${API_BASE}/api/alerts/dismiss`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({hash})});
  renderAlerts();
}

async function restoreAlerts() {
  await fetch(`${API_BASE}/api/alerts/dismissed`,{method:'DELETE'});
  renderAlerts();
}

let analyticsFilter = {days:7, kitchen:'All'};
let _analyticsChart = null;

async function renderAnalytics() {
  document.getElementById('content').innerHTML =
  '<div class="page">' +
  '<div class="page-header"><h2>Analytics & Reports</h2><p>Delivery performance insights</p></div>' +
  '<div class="filter-bar" style="margin-bottom:20px">' +
    '<label style="font-size:13px;font-weight:500;color:#374151">Period:</label>' +
    '<select id="an-days" onchange="analyticsFilter.days=parseInt(this.value);renderAnalytics()">' +
      [7,14,30,90].map(d=>'<option value="'+d+'"'+(analyticsFilter.days===d?' selected':'')+'>Last '+d+' days</option>').join('') +
    '</select>' +
    '<label style="font-size:13px;font-weight:500;color:#374151">Kitchen:</label>' +
    '<select id="an-kitchen" onchange="analyticsFilter.kitchen=this.value;renderAnalytics()">' +
      ['All','Munich','Berlin'].map(k=>'<option value="'+k+'"'+(analyticsFilter.kitchen===k?' selected':'')+'>'+k+'</option>').join('') +
    '</select>' +
  '</div>' +
  '<div id="an-kpi" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:20px">' +
    '<div class="kpi-card blue"><div class="kpi-label">Total Deliveries</div><div class="kpi-value"><span class="skeleton" style="width:80px;display:block">&nbsp;</span></div><div class="kpi-sub">Loading…</div></div>' +
    '<div class="kpi-card green"><div class="kpi-label">On-Time Rate</div><div class="kpi-value"><span class="skeleton" style="width:60px;display:block">&nbsp;</span></div><div class="kpi-sub">Loading…</div></div>' +
    '<div class="kpi-card red"><div class="kpi-label">Failed Count</div><div class="kpi-value"><span class="skeleton" style="width:50px;display:block">&nbsp;</span></div><div class="kpi-sub">Loading…</div></div>' +
    '<div class="kpi-card amber"><div class="kpi-label">Avg / Day</div><div class="kpi-value"><span class="skeleton" style="width:60px;display:block">&nbsp;</span></div><div class="kpi-sub">Loading…</div></div>' +
  '</div>' +
  '<div class="chart-container" style="margin-bottom:20px">' +
    '<div style="font-size:14px;font-weight:600;color:#374151;margin-bottom:12px">Daily Delivery Volume</div>' +
    '<div id="an-chart-wrap" style="position:relative;height:220px"><canvas id="an-chart"></canvas></div>' +
  '</div>' +
  '<div class="grid-2" style="gap:16px;margin-bottom:20px">' +
    '<div class="card">' +
      '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">' +
        '<div class="section-title" style="margin-bottom:0">Courier Performance</div>' +
        '<button class="btn btn-sm" onclick="exportCourierCSV()">⬇ Export CSV</button>' +
      '</div>' +
      '<div id="an-couriers"><div class="skeleton" style="height:120px">&nbsp;</div></div>' +
    '</div>' +
    '<div class="card">' +
      '<div class="section-title">Kitchen Comparison</div>' +
      '<div id="an-kitchen-compare"><div class="skeleton" style="height:120px">&nbsp;</div></div>' +
    '</div>' +
  '</div>' +
  '</div>';

  const n = analyticsFilter.days;
  const k = analyticsFilter.kitchen;
  const kApi = k.toLowerCase() === 'all' ? 'all' : k.toLowerCase(); // backend expects lowercase
  const qs = `days=${n}&kitchen=${kApi}`;

  // Load KPIs
  try {
    const r = await fetch(`${API_BASE}/api/analytics/summary?${qs}`);
    const d = await r.json();
    _renderKPIs(d);
  } catch(e) {
    // fallback: compute from ALL_ROUTES
    const routes = k==='Munich'?MUNICH_ROUTES:k==='Berlin'?BERLIN_ROUTES:ALL_ROUTES;
    const total = routes.reduce((s,r)=>s+r.stops,0)*n;
    const failed = Math.round(total*0.03);
    const late = Math.round(total*0.08);
    const ontime = Math.round((total-late)/total*100);
    _renderKPIs({total,onTime:ontime,failed,avgPerDay:Math.round(total/n)});
  }

  // Load daily chart
  try {
    const r = await fetch(`${API_BASE}/api/analytics/daily?${qs}`);
    const d = await r.json();
    _renderChart(d.daily||d.days||[]);
  } catch(e) {
    // fallback: random demo data
    const days = Array.from({length:n>14?14:n},(_,i)=>{
      const dt = new Date(); dt.setDate(dt.getDate()-i);
      const routes = k==='Munich'?MUNICH_ROUTES:k==='Berlin'?BERLIN_ROUTES:ALL_ROUTES;
      const base = routes.reduce((s,r)=>s+r.stops,0);
      return {date:dt.toISOString().split('T')[0],count:Math.round(base*(0.7+Math.random()*0.6))};
    }).reverse();
    _renderChart(days);
  }

  // Load courier performance
  try {
    const r = await fetch(`${API_BASE}/api/analytics/couriers?${qs}`);
    const d = await r.json();
    _renderCourierTable(d.couriers||[]);
  } catch(e) {
    const couriers = (k==='Munich'?DEMO_COURIERS.filter(c=>c.kitchen==='Munich'):k==='Berlin'?DEMO_COURIERS.filter(c=>c.kitchen==='Berlin'):DEMO_COURIERS)
      .map(c=>({name:c.name,kitchen:c.kitchen,total:c.orders7,failed:Math.round(c.orders7*0.03),onTime:Math.round((1-0.08)*100)}));
    _renderCourierTable(couriers);
  }

  // Load kitchen comparison
  try {
    const r = await fetch(`${API_BASE}/api/analytics/kitchen-compare?days=${n}`);
    const d = await r.json();
    _renderKitchenCompare(d.kitchens||d);
  } catch(e) {
    const mu = MUNICH_ROUTES.reduce((s,r)=>({stops:s.stops+r.stops,boxes:s.boxes+r.boxes}),{stops:0,boxes:0});
    const be = BERLIN_ROUTES.reduce((s,r)=>({stops:s.stops+r.stops,boxes:s.boxes+r.boxes}),{stops:0,boxes:0});
    _renderKitchenCompare({
      Munich:{total:mu.stops*n,couriers:MUNICH_ROUTES.length,onTime:91,failed:Math.round(mu.stops*n*0.02)},
      Berlin:{total:be.stops*n,couriers:BERLIN_ROUTES.length,onTime:88,failed:Math.round(be.stops*n*0.03)},
    });
  }
}

function _renderKPIs(d) {
  const el = document.getElementById('an-kpi');
  if(!el) return;
  el.innerHTML =
    '<div class="kpi-card blue"><div class="kpi-label">Total Deliveries</div><div class="kpi-value">'+(d.total||0)+'</div><div class="kpi-sub">Last '+analyticsFilter.days+' days</div></div>' +
    '<div class="kpi-card green"><div class="kpi-label">On-Time Rate</div><div class="kpi-value">'+(d.onTimeRate!=null?d.onTimeRate:d.onTime||0)+'%</div><div class="kpi-sub">Within delivery window</div></div>' +
    '<div class="kpi-card red"><div class="kpi-label">Failed / Cancelled</div><div class="kpi-value">'+(d.failed||0)+'</div><div class="kpi-sub">Undelivered stops</div></div>' +
    '<div class="kpi-card amber"><div class="kpi-label">Avg / Day</div><div class="kpi-value">'+(d.avgPerDay||0)+'</div><div class="kpi-sub">Stops per day</div></div>';
}

function _renderChart(days) {
  const wrap = document.getElementById('an-chart-wrap');
  if(!wrap) return;
  wrap.innerHTML = '<canvas id="an-chart"></canvas>';
  try {
    if(_analyticsChart){try{_analyticsChart.destroy();}catch(e){}_analyticsChart=null;}
    const ctx = document.getElementById('an-chart');
    if(!ctx||typeof Chart==='undefined') return;
    _analyticsChart = new Chart(ctx, {
      type:'bar',
      data:{
        labels: days.map(d=>d.date),
        datasets:[{
          label:'Deliveries',
          data: days.map(d=>d.count||d.total||0),
          backgroundColor:'rgba(232,93,4,0.7)',
          borderColor:'#e85d04',
          borderWidth:1,
          borderRadius:4,
        }]
      },
      options:{
        responsive:true,
        maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{
          y:{beginAtZero:true,grid:{color:'#f3f4f6'},ticks:{color:'#9ca3af',font:{size:11}}},
          x:{grid:{display:false},ticks:{color:'#9ca3af',font:{size:11},maxTicksLimit:14}},
        }
      }
    });
  } catch(e){}
}

let _courierTableData = [];

function _renderCourierTable(couriers) {
  _courierTableData = couriers;
  const el = document.getElementById('an-couriers');
  if(!el) return;
  el.innerHTML =
  '<div class="table-wrap"><table>' +
  '<thead><tr><th>Courier</th><th>Kitchen</th><th>Total</th><th>Failed</th><th>On-Time %</th></tr></thead><tbody>' +
  (couriers.length===0?'<tr><td colspan="5" style="text-align:center;color:#9ca3af;padding:16px">No data</td></tr>':
  couriers.map(c=>{
    const name = c.courierName||c.name||'—';
    const total = c.total||0;
    const failed = c.failed||0;
    const rate = c.onTimeRate!=null?c.onTimeRate:(c.onTime||0);
    const avgDelay = c.avgDelayMin!=null ? ' (avg +'+c.avgDelayMin+'min)' : '';
    return '<tr>' +
    '<td><b>'+name+'</b></td>' +
    '<td style="color:#6b7280;font-size:12px">'+(c.activeDays||'—')+' days active</td>' +
    '<td>'+total+'</td>' +
    '<td><span style="color:'+(failed>5?'#dc2626':'#374151')+'">'+failed+'</span></td>' +
    '<td><span style="color:'+(rate>=90?'#16a34a':rate>=75?'#d97706':'#dc2626')+'">'+rate+'%'+avgDelay+'</span></td>' +
    '</tr>';
  }).join('')) +
  '</tbody></table></div>';
}

function exportCourierCSV() {
  const rows = [['Courier','Kitchen','Total Deliveries','Failed','On-Time %']];
  _courierTableData.forEach(c=>rows.push([c.name,c.kitchen,c.total,c.failed,c.onTime+'%']));
  const csv = rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,'+encodeURIComponent(csv);
  a.download = 'bellabona-courier-performance-'+new Date().toISOString().split('T')[0]+'.csv';
  a.click();
}

function _renderKitchenCompare(d) {
  const el = document.getElementById('an-kitchen-compare');
  if(!el) return;
  // API returns {kitchens:{munich:{...},berlin:{...}}} OR flat object
  const src = d.kitchens || d;
  const kitchens = Object.keys(src);
  const colors = {Munich:'#3b82f6',Berlin:'#10b981',munich:'#3b82f6',berlin:'#10b981'};
  if(kitchens.length===0){el.innerHTML='<div style="color:#9ca3af;font-size:13px;padding:16px">No comparison data</div>';return;}
  el.innerHTML = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">' +
  kitchens.map(k=>{
    const v = src[k];
    const label = k.charAt(0).toUpperCase()+k.slice(1);
    const color = colors[k]||'#6366f1';
    const rate = v.onTimeRate!=null?v.onTimeRate:(v.onTime||0);
    const couriers = v.courierCount!=null?v.courierCount:(v.couriers||0);
    return '<div style="border:1px solid #e5e7eb;border-radius:8px;padding:14px;border-top:3px solid '+color+'">' +
      '<div style="font-size:14px;font-weight:600;color:#111827;margin-bottom:10px">'+label+'</div>' +
      '<div style="font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:0.04em">Total</div><div style="font-size:22px;font-weight:700;color:#111827;margin-bottom:6px">'+(v.total||0)+'</div>' +
      '<div style="font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:0.04em">Couriers</div><div style="font-size:16px;font-weight:600;color:#374151;margin-bottom:6px">'+couriers+'</div>' +
      '<div style="font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:0.04em">On-Time</div><div style="font-size:16px;font-weight:600;color:'+(rate>=90?'#16a34a':'#d97706')+'">'+rate+'%</div>' +
    '</div>';
  }).join('') +
  '</div>';
}

async function saveProcessConfig() {
  const updates = {
    service_time_default_s: document.getElementById('cfg-svc').value,
    allowed_delay_min: document.getElementById('cfg-delay').value,
    max_packages_per_vehicle: document.getElementById('cfg-maxpkg').value,

    max_weight_per_vehicle_kg: document.getElementById('cfg-maxwt').value,
    delivery_window_start: document.getElementById('cfg-dws').value,
    delivery_window_end: document.getElementById('cfg-dwe').value,
    pickup_window_start: document.getElementById('cfg-pws').value,
    pickup_window_duration_min: document.getElementById('cfg-pwd').value,
    vroom_url: document.getElementById('cfg-vroom').value,
    osrm_url: document.getElementById('cfg-osrm').value,
    late_alert_threshold_min: document.getElementById('cfg-lat').value,
    gps_offline_threshold_min: document.getElementById('cfg-gps').value,
    alert_email: document.getElementById('cfg-email').value,
  };
  const r = await fetch(`${API_BASE}/api/process-config`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(updates)});
  const d = await r.json();
  if(d.ok) { processConfig={...processConfig,...updates}; alert('Process configuration saved!'); }
}

async function saveDepotConfig() {
  const updates = {
    munich_depot_address: document.getElementById('cfg-ma').value,
    munich_depot_lat: document.getElementById('cfg-mlat').value,
    munich_depot_lng: document.getElementById('cfg-mlng').value,
    berlin_depot_address: document.getElementById('cfg-ba').value,
    berlin_depot_lat: document.getElementById('cfg-blat').value,
    berlin_depot_lng: document.getElementById('cfg-blng').value,
  };
  await fetch(`${API_BASE}/api/process-config`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(updates)});
  processConfig={...processConfig,...updates};
  alert('Depot configuration saved!');
}

function saveApiBase() {
  const newBase = document.getElementById('cfg-apibase').value.trim().replace(/\/+$/,'');
  if(!newBase){alert('URL cannot be empty');return;}
  // Update global and persist
  window.API_BASE = newBase;
  try { localStorage.setItem('lmm_api_base', newBase); } catch(e){}
  document.getElementById('api-test-result').innerHTML='<div style="font-size:13px;color:#16a34a;margin-top:8px">✅ API base updated to '+newBase+' — reload to confirm all pages use new URL.</div>';
}

async function testApiConnection() {
  const base = document.getElementById('cfg-apibase').value;
  const el = document.getElementById('api-test-result');
  el.innerHTML='<div style="font-size:13px;color:#6b7280;margin-top:8px">Testing…</div>';
  try {
    const r = await fetch(base+'/api/health',{signal:AbortSignal.timeout(5000)});
    const d = await r.json();
    el.innerHTML='<div style="font-size:13px;color:#16a34a;margin-top:8px">✅ Connected — '+d.time+'</div>';
  } catch(e) {
    el.innerHTML='<div style="font-size:13px;color:#dc2626;margin-top:8px">❌ Connection failed: '+e.message+'</div>';
  }
}
</script>
</body>
