function _v(id) { return parseFloat(document.getElementById(id)?.value)||0; }

function _recalcKpi() {
  // ── EXACT formulas — uses editable rates from window._kpiRates ──
  const R = window._kpiRates || {};

  // Samir: tiered + pickups×rate
  function _samirCost(stops, pickups) {
    if (stops <= 0) return 0;
    const t4=R.samirT4||75, t5=R.samirT5||85, t6=R.samirT6||95, t7=R.samirT7||110, t8=R.samirT8||120, ex=R.samirExtra||15;
    let base = stops<=4?t4:stops===5?t5:stops===6?t6:stops===7?t7:stops===8?t8:t8+(stops-8)*ex;
    return base + pickups * (R.samirPickup||10);
  }

  // Ali, Ali2, Ali3, Ali4, Jozef
  function _stdRate(stops) {
    if (stops <= 0) return 0;
    const t4=R.aliT4||110, t5=R.aliT5||115, t6=R.aliT6||125, ex=R.aliExtra||15;
    if (stops <= 4) return t4;
    if (stops === 5) return t5;
    if (stops === 6) return t6;
    return t6 + (stops - 6) * ex;
  }

  // Packator
  function _packatorRate(stops) {
    const minStops = R.packatorMinStops||3, base=R.packatorBase||101, perStop=R.packatorPerStop||14;
    if (stops <= minStops-1) return 0;
    if (stops <= 4) return base;
    return base + (stops - 4) * perStop;
  }

  // Per-packator costs
  const p1cost = _packatorRate(_v('kpi-p1stops'));
  const p2cost = _packatorRate(_v('kpi-p2stops'));
  const p3cost = _packatorRate(_v('kpi-p3stops'));
  const p4cost = _packatorRate(_v('kpi-p4stops'));
  const p5cost = _packatorRate(_v('kpi-p5stops')); // Stadtbote 1
  const p6cost = _packatorRate(_v('kpi-p6stops')); // Stadtbote 2
  const packatorServiceCost = p1cost + p2cost + p3cost + p4cost + p5cost + p6cost;
  const packatorCost = packatorServiceCost + _v('kpi-packatorDispatch');
  const packatorStops = _v('kpi-p1stops')+_v('kpi-p2stops')+_v('kpi-p3stops')+_v('kpi-p4stops')+_v('kpi-p5stops')+_v('kpi-p6stops');

  // Samir
  const sStops = _v('kpi-samirStops');
  const samirPickups = _v('kpi-samirPickup');
  const samirCost = _samirCost(sStops, samirPickups);
  const samirPickupCost = 0; // already included in samirCost via _samirCost

  // Ali & Jozef
  const aliCost  = _stdRate(_v('kpi-aliStops')) + _stdRate(_v('kpi-ali2stops')) + _stdRate(_v('kpi-ali3stops')) + _stdRate(_v('kpi-ali4stops'));
  const jozefCost = _stdRate(_v('kpi-jozefStops'));

  // Mykhailo: direct cost entry
  const mykhailoCost = _v('kpi-mykhailoRate');

  // Internal costs
  const internalCost = _v('kpi-driverCost')+_v('kpi-dispatcherCost')+_v('kpi-logMgrCost')+_v('kpi-fuelCost');

  // Extra
  const extraCost = _v('kpi-extraAmt');

  const totalLogCost = packatorCost + samirCost + samirPickupCost + aliCost + jozefCost + mykhailoCost + internalCost + extraCost;
  const totalStops = packatorStops + sStops + _v('kpi-samirPickup') + _v('kpi-mykhailoStops') +
    _v('kpi-aliStops')+_v('kpi-ali2stops')+_v('kpi-ali3stops')+_v('kpi-ali4stops')+_v('kpi-jozefStops');
  const totalRevenue = _v('kpi-totalRevenue') + _v('kpi-serviceFee');
  const netProfit = totalRevenue - totalLogCost;
  const logPct = totalRevenue > 0 ? (totalLogCost/totalRevenue*100).toFixed(1) : 0;
  const meals = _v('kpi-meals');
  const mealsPerStop = totalStops > 0 ? (meals/totalStops).toFixed(1) : 0;
  const cpStop = totalStops > 0 ? (totalLogCost/totalStops).toFixed(2) : 0;

  const set = (id,val) => { const el=document.getElementById(id); if(el) el.textContent=val; };
  set('kpi-out-logcost','€'+totalLogCost.toFixed(0));
  set('kpi-out-profit', (netProfit>=0?'€':'−€')+Math.abs(netProfit).toFixed(0));
  set('kpi-out-cpstop','€'+cpStop);
  // Also update Packator rate display
  const p1el=document.getElementById('kpi-p1-rate');if(p1el)p1el.textContent='€'+p1cost.toFixed(0);
  const p2el=document.getElementById('kpi-p2-rate');if(p2el)p2el.textContent='€'+p2cost.toFixed(0);
  const p3el=document.getElementById('kpi-p3-rate');if(p3el)p3el.textContent='€'+p3cost.toFixed(0);
  const p4el=document.getElementById('kpi-p4-rate');if(p4el)p4el.textContent='€'+p4cost.toFixed(0);
  const p5el=document.getElementById('kpi-p5-rate');if(p5el)p5el.textContent='€'+p5cost.toFixed(0);
  const p6el=document.getElementById('kpi-p6-rate');if(p6el)p6el.textContent='€'+p6cost.toFixed(0);
  const scEl=document.getElementById('kpi-samir-rate');if(scEl)scEl.textContent='€'+samirCost.toFixed(0);
  const a1El=document.getElementById('kpi-ali-rate');if(a1El)a1El.textContent='€'+_stdRate(_v('kpi-aliStops')).toFixed(0);
  const a2El=document.getElementById('kpi-ali2-rate');if(a2El)a2El.textContent='€'+_stdRate(_v('kpi-ali2stops')).toFixed(0);
  const a3El=document.getElementById('kpi-ali3-rate');if(a3El)a3El.textContent='€'+_stdRate(_v('kpi-ali3stops')).toFixed(0);
  const a4El=document.getElementById('kpi-ali4-rate');if(a4El)a4El.textContent='€'+_stdRate(_v('kpi-ali4stops')).toFixed(0);
  const jEl=document.getElementById('kpi-jozef-rate');if(jEl)jEl.textContent='€'+jozefCost.toFixed(0);
  set('kpi-out-mstop',''+mealsPerStop);
  set('kpi-out-pct',''+logPct+'%');
  set('kpi-out-stops',''+Math.round(totalStops));

  // Color profit card
  const profitEl = document.getElementById('kpi-out-profit');
  if (profitEl) profitEl.style.color = netProfit >= 0 ? '#10b981' : '#ef4444';

  // Payment summary table
  const payTable = document.getElementById('kpi-payment-table');
  if (payTable) {
    payTable.innerHTML =
      '<table style="width:100%;border-collapse:collapse;font-size:13px">' +
      '<thead><tr style="background:#f9fafb"><th style="padding:8px 12px;text-align:left;border-bottom:2px solid #e5e7eb">Entity</th>' +
      '<th style="padding:8px 12px;text-align:right;border-bottom:2px solid #e5e7eb">Daily (Calc)</th></tr></thead><tbody>' +
      [
        ['Ali (Total Payable)', aliCost],
        ['Jozef (Payable)', jozefCost],
        ['Packator Fleet (Service)', packatorServiceCost],
        ['Packator Dispatch (Manual)', _v('kpi-packatorDispatch')],
        ['Samir (incl. '+(samirPickups>0?samirPickups+' pickup':'no pickup')+')', samirCost],
        ['Mykhailo (Payable)', mykhailoCost],
        ['Internal Fleet', internalCost],
        ['Extra Costs', extraCost],
      ].map(([name,val]) =>
        '<tr style="border-bottom:1px solid #f3f4f6"><td style="padding:8px 12px;font-weight:500">'+name+'</td>' +
        '<td style="padding:8px 12px;text-align:right;color:'+(val>0?'#dc2626':'#6b7280')+'">€'+val.toFixed(2)+'</td></tr>'
      ).join('') +
      '<tr style="background:#fef9c3;font-weight:700"><td style="padding:8px 12px">TOTAL LOGISTIC COST</td>' +
      '<td style="padding:8px 12px;text-align:right;color:#dc2626">€'+totalLogCost.toFixed(2)+'</td></tr>' +
      '<tr style="background:#f0fdf4;font-weight:700"><td style="padding:8px 12px">NET PROFIT</td>' +
      '<td style="padding:8px 12px;text-align:right;color:'+(netProfit>=0?'#16a34a':'#dc2626')+'">€'+netProfit.toFixed(2)+'</td></tr>' +
      '</tbody></table>';
  }

  // Store current calculated values for saving
  window._kpiCalc = { totalLogCost, netProfit, logPct, totalStops, cpStop, mealsPerStop,
    packatorCost, samirCost, aliCost, jozefCost, mykhailoCost, internalCost, extraCost };
}

    // Main inputs
    totalRevenue: _v('kpi-totalRevenue'), serviceFee: _v('kpi-serviceFee'),
    catering: _v('kpi-catering'), meals: _v('kpi-meals'), addOns: _v('kpi-addOns'),
    gygCatering: _v('kpi-gygCatering'), revolute: _v('kpi-revolute'),
    paypal: _v('kpi-paypal'), ufaSales: _v('kpi-ufaSales'),
    // Packator
    p1stops:_v('kpi-p1stops'),p2stops:_v('kpi-p2stops'),p3stops:_v('kpi-p3stops'),
    p4stops:_v('kpi-p4stops'),p5stops:_v('kpi-p5stops'),p6stops:_v('kpi-p6stops'),
    packatorDispatch:_v('kpi-packatorDispatch'),
    samirStops:_v('kpi-samirStops'),samirPickup:_v('kpi-samirPickup'),
    mykhailoStops:_v('kpi-mykhailoStops'),mykhailoRate:_v('kpi-mykhailoRate'),
    // Ali & Jozef
    jozefStops:_v('kpi-jozefStops'),aliStops:_v('kpi-aliStops'),ali2stops:_v('kpi-ali2stops'),
    ali3stops:_v('kpi-ali3stops'),ali4stops:_v('kpi-ali4stops'),
    // Internal
    driverCost:_v('kpi-driverCost'),dispatcherCost:_v('kpi-dispatcherCost'),
    logMgrCost:_v('kpi-logMgrCost'),fuelCost:_v('kpi-fuelCost'),
    internalDel:_v('kpi-internalDel'),internalPickup:_v('kpi-internalPickup'),
    totalDelManual:_v('kpi-totalDelManual'),dishesScanned:_v('kpi-dishesScanned'),
    deliveriesLate:_v('kpi-deliveriesLate'),minutesLate:_v('kpi-minutesLate'),
    // Extra
    extraAmt:_v('kpi-extraAmt'),
    extraPerson:document.getElementById('kpi-extraPerson')?.value||'',
    extraNote:document.getElementById('kpi-extraNote')?.value||'',
    // Calculated
    ...(window._kpiCalc||{}),
    savedAt: new Date().toISOString()
  };

  await window._fbSetDoc(window._fbDoc(window._fbDb,'logisticKPI','Berlin_'+date), data);
  const el=document.getElementById('kpi-date');
  if(el)el.style.border='2px solid #10b981';
  setTimeout(()=>{if(el)el.style.border='';},2000);
  alert('✅ KPI data saved for '+date+' (Berlin)');
}

async function loadKpiDay(date) {
  if (!date || !window._fbReady || !window._fbDb) return;
  try {
    const snap = await window._fbGetDoc(window._fbDoc(window._fbDb,'logisticKPI','Berlin_'+date));
    if (!snap.exists()) { _recalcKpi(); return; }
    const d = snap.data();
    const setVal = (id, key) => { const el=document.getElementById(id); if(el&&d[key]!==undefined) el.value=d[key]; };
    setVal('kpi-totalRevenue','totalRevenue');setVal('kpi-serviceFee','serviceFee');
    setVal('kpi-catering','catering');setVal('kpi-meals','meals');setVal('kpi-addOns','addOns');
    setVal('kpi-gygCatering','gygCatering');setVal('kpi-revolute','revolute');
    setVal('kpi-paypal','paypal');setVal('kpi-ufaSales','ufaSales');
    setVal('kpi-p1stops','p1stops');setVal('kpi-p2stops','p2stops');setVal('kpi-p3stops','p3stops');
    setVal('kpi-p4stops','p4stops');setVal('kpi-p5stops','p5stops');setVal('kpi-p6stops','p6stops');
    setVal('kpi-packatorDispatch','packatorDispatch');setVal('kpi-samirStops','samirStops');
    setVal('kpi-samirPickup','samirPickup');setVal('kpi-mykhailoStops','mykhailoStops');setVal('kpi-mykhailoRate','mykhailoRate');
    setVal('kpi-jozefStops','jozefStops');setVal('kpi-aliStops','aliStops');setVal('kpi-ali2stops','ali2stops');
    setVal('kpi-ali3stops','ali3stops');setVal('kpi-ali4stops','ali4stops');
    setVal('kpi-driverCost','driverCost');setVal('kpi-dispatcherCost','dispatcherCost');
    setVal('kpi-logMgrCost','logMgrCost');setVal('kpi-fuelCost','fuelCost');
    setVal('kpi-internalDel','internalDel');setVal('kpi-internalPickup','internalPickup');
    setVal('kpi-totalDelManual','totalDelManual');setVal('kpi-dishesScanned','dishesScanned');
    setVal('kpi-deliveriesLate','deliveriesLate');setVal('kpi-minutesLate','minutesLate');
    setVal('kpi-extraAmt','extraAmt');
    if(d.extraPerson){const el=document.getElementById('kpi-extraPerson');if(el)el.value=d.extraPerson;}
    if(d.extraNote){const el=document.getElementById('kpi-extraNote');if(el)el.value=d.extraNote;}
    _recalcKpi();
    await loadKpiCharts();
  } catch(e) { console.warn('KPI load error:', e); }
}

async function loadKpiCharts() {
  if (typeof Chart === 'undefined') return;
  try {
    const { getDocs } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
    const snap = await getDocs(window._fbCollection(window._fbDb,'logisticKPI'));
    const records = [];
    snap.forEach(d => { const data=d.data(); if(data.city==='Berlin') records.push(data); });
    records.sort((a,b)=>a.date.localeCompare(b.date));
    const last30 = records.slice(-30);
    const labels = last30.map(r=>r.date.slice(5)); // MM-DD

    // Revenue vs Cost chart
    const revCtx = document.getElementById('kpi-chart-rev');
    if (revCtx) {
      if (window._kpiChartRev) window._kpiChartRev.destroy();
      window._kpiChartRev = new Chart(revCtx, {
        type:'line',
        data:{ labels,
          datasets:[
            {label:'Net Revenue',data:last30.map(r=>(r.totalRevenue||0)+(r.serviceFee||0)),borderColor:'#10b981',backgroundColor:'rgba(16,185,129,0.1)',tension:0.3,fill:true},

async function saveProcessConfig() {
  const updates = {
    service_time_default_s: document.getElementById('cfg-svc').value,
    allowed_delay_min: document.getElementById('cfg-delay').value,
    max_packages_per_vehicle: document.getElementById('cfg-maxpkg').value,
    package_weight_kg: document.getElementById('cfg-pkgwt').value,
    max_weight_per_vehicle_kg: document.getElementById('cfg-maxwt').value,
    delivery_window_start: document.getElementById('cfg-dws').value,
    delivery_window_end: document.getElementById('cfg-dwe').value,
    pickup_window_start: document.getElementById('cfg-pws').value,
    pickup_window_duration_min: document.getElementById('cfg-pwd').value,
    vroom_url: document.getElementById('cfg-vroom').value,
    osrm_url: document.getElementById('cfg-osrm').value,
    late_alert_threshold_min: document.getElementById('cfg-lat').value,
    gps_offline_threshold_min: document.getElementById('cfg-gps').value,
    alert_email: document.getElementById('cfg-email').value,
    savedAt: new Date().toISOString(),
  };
  try {
    if (API_BASE) {
      const r = await fetch(`${API_BASE}/api/process-config`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(updates)});
      const d = await r.json();
      if(!d.ok) throw new Error(d.error||'API error');
    } else if (window._fbReady && window._fbDb) {
      await window._fbSetDoc(window._fbDoc(window._fbDb, 'config', 'processConfig'), updates);
    }
    processConfig = {...processConfig, ...updates};
    alert('✅ Process configuration saved to Firebase!');
  } catch(e) { alert('Save error: ' + e.message); }
}

window._companiesTab = 'companies';

async function renderFleetAccounts() {
  const bodyEl = document.getElementById('content');
  bodyEl.innerHTML = '<div class="page"><div style="padding:60px;text-align:center;color:#9ca3af">Loading fleet accounts…</div></div>';

  let accounts = [];
  if (window._fbReady && window._fbDb) {
    try {
      const { getDocs } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');
      const snap = await getDocs(window._fbCollection(window._fbDb,'fleetAccounts'));
      snap.forEach(d => accounts.push({id: d.id, ...d.data()}));
    } catch(e) {}
  }

  bodyEl.innerHTML =
  '<div class="page">' +
  '<div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px">' +
    '<div><h2 style="font-size:22px;font-weight:700">🚚 Fleet Accounts</h2>' +
    '<p style="color:#6b7280;font-size:14px">Companies with fleet access — track expenses, stops & hours</p></div>' +
    '<div style="display:flex;gap:8px">' +
      '<button class="btn" onclick="window._companiesTab=\'companies\';renderCompanies()">← Back to Companies</button>' +
      '<button class="btn btn-primary" onclick="openAddFleetModal()">+ Add Fleet Account</button>' +
    '</div>' +
  '</div>' +
  (accounts.length === 0 ?
    '<div style="background:#f9fafb;border:2px dashed #e5e7eb;border-radius:12px;padding:40px;text-align:center;color:#9ca3af">' +
    '<div style="font-size:32px;margin-bottom:8px">🚚</div>' +
    '<div style="font-size:16px;font-weight:600;margin-bottom:4px">No fleet accounts yet</div>' +
    '<div style="font-size:13px;margin-bottom:16px">Add companies that need their own dashboard to track delivery costs and hours</div>' +
    '<button class="btn btn-primary" onclick="openAddFleetModal()">+ Create First Fleet Account</button>' +
    '</div>'
  :
    '<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px">' +
    accounts.map(a =>
      '<div style="background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:18px">' +
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">' +
          '<div style="font-size:16px;font-weight:700">'+(a.companyName||'—')+'</div>' +
          '<span style="background:#f0fdf4;color:#16a34a;font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px">Active</span>' +
        '</div>' +
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:12px;color:#6b7280;margin-bottom:12px">' +
          '<div>👤 '+(a.ownerName||'—')+'</div>' +
          '<div>📧 '+(a.email||'—')+'</div>' +
          '<div>📞 '+(a.phone||'—')+'</div>' +
          '<div>🏙️ '+(a.city||'—')+'</div>' +
          '<div>💶 Rate: '+(a.ratePerStop||'—')+' €/stop</div>' +
          '<div>⏰ '+(a.ratePerHour||'—')+' €/hr</div>' +
        '</div>' +
        '<div style="display:flex;gap:6px">' +
          '<button class="btn btn-sm" onclick="openEditFleetModal(\''+a.id+'\')">✏️ Edit</button>' +
          '<button class="btn btn-sm" style="background:#6366f1;color:#fff;border-color:#6366f1">📊 View Dashboard</button>' +
        '</div>' +
      '</div>'
    ).join('') +
    '</div>'
  ) +
  '</div>';
}

function openAddFleetModal() {
  _openFleetModal(null);
}
function openEditFleetModal(id) {
  // find account and open modal
  _openFleetModal(id);
}

function _openFleetModal(id) {
  const existing = document.getElementById('fleet-modal');
  if (existing) existing.remove();
  const mo = document.createElement('div');
  mo.className = 'modal-overlay'; mo.id = 'fleet-modal';
  mo.innerHTML =
    '<div class="modal" style="width:min(520px,95vw)">' +
    '<button class="modal-close" onclick="this.closest(\'.modal-overlay\').remove()">×</button>' +
    '<h3>'+(id?'Edit':'New')+' Fleet Account</h3>' +
    '<div style="display:flex;flex-direction:column;gap:10px;margin-top:14px">' +
      '<div><label style="font-size:12px;font-weight:600">Company Name *</label>' +
        '<input id="fa-company" placeholder="e.g. Tech GmbH" style="width:100%;border:1px solid #d1d5db;border-radius:6px;padding:7px 10px;font-size:13px;margin-top:3px"></div>' +
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">' +
        '<div><label style="font-size:12px;font-weight:600">Owner / Contact Name</label>' +
          '<input id="fa-owner" style="width:100%;border:1px solid #d1d5db;border-radius:6px;padding:7px 10px;font-size:13px;margin-top:3px"></div>' +
        '<div><label style="font-size:12px;font-weight:600">City</label>' +
          '<select id="fa-city" style="width:100%;border:1px solid #d1d5db;border-radius:6px;padding:7px 10px;font-size:13px;margin-top:3px"><option>Berlin</option><option>Munich</option></select></div>' +
      '</div>' +
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">' +
        '<div><label style="font-size:12px;font-weight:600">Email (login)</label>' +
          '<input id="fa-email" type="email" style="width:100%;border:1px solid #d1d5db;border-radius:6px;padding:7px 10px;font-size:13px;margin-top:3px"></div>' +
        '<div><label style="font-size:12px;font-weight:600">Phone</label>' +
          '<input id="fa-phone" type="tel" style="width:100%;border:1px solid #d1d5db;border-radius:6px;padding:7px 10px;font-size:13px;margin-top:3px"></div>' +
      '</div>' +
      '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">' +
        '<div><label style="font-size:12px;font-weight:600">Rate per Stop (€)</label>' +
          '<input id="fa-rate-stop" type="number" step="0.01" placeholder="3.50" style="width:100%;border:1px solid #d1d5db;border-radius:6px;padding:7px 10px;font-size:13px;margin-top:3px"></div>' +
        '<div><label style="font-size:12px;font-weight:600">Rate per Hour (€)</label>' +
          '<input id="fa-rate-hour" type="number" step="0.01" placeholder="25.00" style="width:100%;border:1px solid #d1d5db;border-radius:6px;padding:7px 10px;font-size:13px;margin-top:3px"></div>' +
        '<div><label style="font-size:12px;font-weight:600">Rate per Box (€)</label>' +
          '<input id="fa-rate-box" type="number" step="0.01" placeholder="1.50" style="width:100%;border:1px solid #d1d5db;border-radius:6px;padding:7px 10px;font-size:13px;margin-top:3px"></div>' +
      '</div>' +
      '<div><label style="font-size:12px;font-weight:600">Notes / Special Terms</label>' +
        '<textarea id="fa-notes" style="width:100%;border:1px solid #d1d5db;border-radius:6px;padding:7px 10px;font-size:13px;margin-top:3px;height:60px;resize:vertical"></textarea></div>' +
      '<div style="background:#fffbeb;border:1px solid #fde68a;border-radius:6px;padding:10px;font-size:12px;color:#92400e">' +
        '🔑 An account will be created so the fleet owner can log in and view their own delivery reports, invoices, and route history.' +
      '</div>' +
    '</div>' +
    '<div style="display:flex;gap:8px;justify-content:flex-end;margin-top:18px">' +
      '<button class="btn" onclick="this.closest(\'.modal-overlay\').remove()">Cancel</button>' +
      '<button class="btn btn-primary" onclick="saveFleetAccount()">💾 Save Account</button>' +
    '</div>' +
    '</div>';
  document.body.appendChild(mo);
}

async function saveFleetAccount() {
  const companyName = document.getElementById('fa-company').value.trim();
  if (!companyName) { alert('Company name is required'); return; }
  const data = {
    companyName,
    ownerName:    document.getElementById('fa-owner').value.trim(),
    city:         document.getElementById('fa-city').value,
    email:        document.getElementById('fa-email').value.trim(),
    phone:        document.getElementById('fa-phone').value.trim(),
    ratePerStop:  document.getElementById('fa-rate-stop').value,
    ratePerHour:  document.getElementById('fa-rate-hour').value,
    ratePerBox:   document.getElementById('fa-rate-box').value,
    notes:        document.getElementById('fa-notes').value.trim(),
    createdAt:    new Date().toISOString(),
  };
  if (window._fbReady && window._fbDb) {
    const id = 'fleet_' + companyName.toLowerCase().replace(/\s+/g,'_') + '_' + Date.now();
    await window._fbSetDoc(window._fbDoc(window._fbDb,'fleetAccounts',id), data).catch(e=>alert('Save error: '+e.message));
  }
  document.getElementById('fleet-modal').remove();
  renderFleetAccounts();
}
</script>
</body>
</html>
