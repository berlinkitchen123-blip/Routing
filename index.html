async function saveProcessConfig() {
  const updates = {
    service_time_default_s: document.getElementById('cfg-svc').value,
    allowed_delay_min: document.getElementById('cfg-delay').value,
    max_packages_per_vehicle: document.getElementById('cfg-maxpkg').value,
    package_weight_kg: document.getElementById('cfg-pkgwt').value,
    max_weight_per_vehicle_kg: document.getElementById('cfg-maxwt').value,
    delivery_window_start: document.getElementById('cfg-dws').value,
    delivery_window_end: document.getElementById('cfg-dwe').value,
    pickup_window_start: document.getElementById('cfg-pws').value,
    pickup_window_duration_min: document.getElementById('cfg-pwd').value,
    vroom_url: document.getElementById('cfg-vroom').value,
    osrm_url: document.getElementById('cfg-osrm').value,
    late_alert_threshold_min: document.getElementById('cfg-lat').value,
    gps_offline_threshold_min: document.getElementById('cfg-gps').value,
    alert_email: document.getElementById('cfg-email').value,
  };
  const r = await fetch(`${API_BASE}/api/process-config`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(updates)});
  const d = await r.json();
  if(d.ok) { processConfig={...processConfig,...updates}; alert('Process configuration saved!'); }
}

async function saveDepotConfig() {
  const updates = {
    munich_depot_address: document.getElementById('cfg-ma').value,
    munich_depot_lat: document.getElementById('cfg-mlat').value,
    munich_depot_lng: document.getElementById('cfg-mlng').value,
    berlin_depot_address: document.getElementById('cfg-ba').value,
    berlin_depot_lat: document.getElementById('cfg-blat').value,
    berlin_depot_lng: document.getElementById('cfg-blng').value,
  };
  await fetch(`${API_BASE}/api/process-config`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(updates)});
  processConfig={...processConfig,...updates};
  alert('Depot configuration saved!');
}

function saveApiBase() {
  const newBase = document.getElementById('cfg-apibase').value.trim().replace(/\/+$/,'');
  if(!newBase){alert('URL cannot be empty');return;}
  // Update global and persist
  window.API_BASE = newBase;
  try { localStorage.setItem('lmm_api_base', newBase); } catch(e){}
  document.getElementById('api-test-result').innerHTML='<div style="font-size:13px;color:#16a34a;margin-top:8px">✅ API base updated to '+newBase+' — reload to confirm all pages use new URL.</div>';
}

async function testApiConnection() {
  const base = document.getElementById('cfg-apibase').value;
  const el = document.getElementById('api-test-result');
  el.innerHTML='<div style="font-size:13px;color:#6b7280;margin-top:8px">Testing…</div>';
  try {
    const r = await fetch(base+'/api/health',{signal:AbortSignal.timeout(5000)});
    const d = await r.json();
    el.innerHTML='<div style="font-size:13px;color:#16a34a;margin-top:8px">✅ Connected — '+d.time+'</div>';
  } catch(e) {
    el.innerHTML='<div style="font-size:13px;color:#dc2626;margin-top:8px">❌ Connection failed: '+e.message+'</div>';
  }
}

      '<button class="btn" onclick="this.closest(\'.modal-overlay\').remove()">Cancel</button>' +
      '<button class="btn btn-primary" onclick="saveFleetAccount()">💾 Save Account</button>' +
    '</div>' +
    '</div>';
  document.body.appendChild(mo);
}

async function saveFleetAccount() {
  const companyName = document.getElementById('fa-company').value.trim();
  if (!companyName) { alert('Company name is required'); return; }
  const data = {
    companyName,
    ownerName:    document.getElementById('fa-owner').value.trim(),
    city:         document.getElementById('fa-city').value,
    email:        document.getElementById('fa-email').value.trim(),
    phone:        document.getElementById('fa-phone').value.trim(),
    ratePerStop:  document.getElementById('fa-rate-stop').value,
    ratePerHour:  document.getElementById('fa-rate-hour').value,
    ratePerBox:   document.getElementById('fa-rate-box').value,
    notes:        document.getElementById('fa-notes').value.trim(),
    createdAt:    new Date().toISOString(),
  };
  if (window._fbReady && window._fbDb) {
    const id = 'fleet_' + companyName.toLowerCase().replace(/\s+/g,'_') + '_' + Date.now();
    await window._fbSetDoc(window._fbDoc(window._fbDb,'fleetAccounts',id), data).catch(e=>alert('Save error: '+e.message));
  }
  document.getElementById('fleet-modal').remove();
  renderFleetAccounts();
}
</script>
